<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Truco Argentino - Motor de Reglas Mejorado</title>
    <style>
        /* ===== ESTILOS ORIGINALES CONSERVADOS ===== */
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: #111;
            font-family: 'Poppins', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at center, #8d6e63 0%, #4e342e 60%, #211510 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            z-index: 10;
        }

        .score-board {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
        }

        .player-score {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .player-score span {
            font-size: 1.2rem;
            color: #f3b33d;
        }

        button.icon-btn {
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        .mesa-area {
            position: absolute;
            top: 18%; /* Subido de 25% para evitar solapamiento */
            left: -10%;
            right: -10%;
            height: 42%; /* Compactado de 45% */
            background: linear-gradient(180deg, rgba(62, 39, 35, 0.8) 0%, rgba(33, 21, 16, 0.9) 100%);
            border-radius: 50%;
            border: 4px solid #bcaaa4;
            box-shadow: inset 0 20px 50px rgba(0, 0, 0, 0.8), 0 10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .baza-row {
            display: flex;
            justify-content: center;
            gap: 10px; /* Reducido de 15px */
            margin: 2px 0; /* Reducido de 5px */
            z-index: 5;
        }

        .my-hand-container {
            position: absolute;
            bottom: 115px;
            /* Subido de 80px para dar espacio a botones */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 20;
        }

        .carta {
            width: 90px;
            height: 138px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: -3px 5px 15px rgba(0, 0, 0, 0.6);
            transform-origin: bottom center;
            position: relative;
        }

        .carta.selected {
            transform: translateY(-30px) scale(1.1) !important;
            z-index: 30 !important;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
        }

        .carta.small {
            width: 60px;
            height: 92px;
            transform: none;
            margin: 0 5px;
        }

        .bottom-action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, #111 0%, rgba(17, 17, 17, 0.9) 100%);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 30;
        }

        .buttons-scroll {
            display: flex;
            flex-wrap: nowrap;
            /* Permitir envolver botones */
            justify-content: center;
            /* Centrar botones */
            gap: 6px;
            padding-bottom: 2px;
        }

        .btn-action {
            flex: 0 0 auto;
            background: linear-gradient(180deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: 2px solid #5c7cfa;
            border-radius: 8px;
            padding: 12px 15px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #0f1b2d;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0f1b2d;
        }

        .btn-rojo {
            background: linear-gradient(180deg, #e53935 0%, #b71c1c 100%);
            border-color: #ef5350;
            box-shadow: 0 4px 0 #7f0000;
        }

        .btn-verde {
            background: linear-gradient(180deg, #43a047 0%, #1b5e20 100%);
            border-color: #66bb6a;
            box-shadow: 0 4px 0 #003300;
        }

        .turno {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            z-index: 10;
        }

        .turno.mio {
            background: #4caf50;
            animation: pulse 1s infinite;
        }

        .log {
            background: rgba(0, 0, 0, 0.85);
            position: absolute;
            top: 105px;
            left: 10px;
            right: 10px;
            border-radius: 12px;
            padding: 8px;
            color: #ffd966;
            text-align: center;
            font-size: 0.85rem;
            z-index: 15;
            min-height: 40px;
            pointer-events: none;
            border: 1px solid rgba(255, 215, 61, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .btn-play-card {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 0 #0d47a1;
            z-index: 25;
            display: none;
            font-size: 1.1rem;
        }

        /* ===== NUEVO: MODAL DE JERARQUÍA ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .jerarquia-modal {
            background: #2c1e16;
            border: 3px solid #bcaaa4;
            border-radius: 20px;
            padding: 20px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #f5e6d3;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.8);
        }

        .jerarquia-modal h3 {
            text-align: center;
            margin-top: 0;
            color: #f3b33d;
            text-shadow: 2px 2px 0 #5d2e0e;
            font-size: 1.6rem;
        }

        .jerarquia-modal .close-btn {
            float: right;
            background: #b71c1c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: -10px;
            margin-right: -10px;
        }

        .jerarquia-list {
            list-style: none;
            padding: 0;
        }

        .jerarquia-list li {
            display: flex;
            align-items: center;
            padding: 8px 5px;
            border-bottom: 1px solid #5d4037;
            font-size: 1rem;
        }

        .rank-number {
            display: inline-block;
            width: 30px;
            font-weight: bold;
            color: #f3b33d;
        }

        /* Estilo especial para resultados */
        .score-row-result {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .score-row-result.winner {
            border: 2px solid #f3b33d;
            background: rgba(243, 179, 61, 0.1);
        }

        .carta-mini {
            width: 30px;
            height: 46px;
            border-radius: 4px;
            margin-right: 10px;
            box-shadow: 0 2px 5px black;
        }

        .nota {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 15px;
            text-align: center;
        }

        .baza-result {
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffd966;
            background: rgba(0, 0, 0, 0.6);
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 4px;
            border: 1px solid rgba(255, 217, 102, 0.4);
            display: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px; /* Espacio para la siguiente fila */
        }

        @media (max-width: 500px) {
            .carta {
                width: 70px;
                height: 108px;
            }

            .my-hand-container {
                bottom: 10%;
            }

            .btn-action {
                padding: 8px 10px;
                font-size: 0.75rem;
                border-width: 1.5px;
            }
        }

        @media (max-width: 360px) {
            .btn-action {
                padding: 6px 8px;
                font-size: 0.7rem;
            }

            .my-hand-container {
                bottom: 10%;
                /* Más espacio si hay mucho wrap */
            }
        }
    </style>
</head>

<body>
    <div class="container" id="gameScreen">

        <!-- Header -->
        <div class="top-bar">
            <button id="quitGameBtn" class="icon-btn">↩</button>
            <div class="score-board" id="playersRow"></div>
            <button id="configBtn" class="icon-btn" style="background: rgba(0,0,0,0.5);">⚙</button>
        </div>

        <div class="turno" id="turnText">Conectando...</div>

        <!-- Mesa -->
        <div class="mesa-area" id="mesaArea">
            <div class="baza-row" id="baza1"></div>
            <div class="baza-result" id="resBaza1"></div>
            <div class="baza-row" id="baza2" style="margin-top: 5px;"></div>
            <div class="baza-result" id="resBaza2"></div>
            <div class="baza-row" id="baza3" style="margin-top: 5px;"></div>
            <div class="baza-result" id="resBaza3"></div>
        </div>

        <button id="btnJugarCarta" class="btn-play-card">⬆ Jugar Carta</button>

        <div class="log" id="log">Esperando acciones...</div>

        <!-- Mano -->
        <div class="my-hand-container" id="myHand"></div>

        <!-- Toolbar Inferior -->
        <div class="bottom-action-bar">
            <div class="buttons-scroll" id="respuestasRow"
                style="display:none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:5px;">
                <button class="btn-action btn-verde" id="btnQuiero">¡Quiero!</button>
                <button class="btn-action btn-rojo" id="btnNoQuiero">No Quiero</button>
            </div>

            <div class="buttons-scroll" id="cantosEnvidoRow">
                <button class="btn-action" id="btnEnvido">Envido</button>
                <button class="btn-action" id="btnRealEnvido">Real Envido</button>
                <button class="btn-action" id="btnFaltaEnvido">Falta Envido</button>
            </div>

            <div class="buttons-scroll" id="cantosTrucoRow">
                <button class="btn-action" id="btnTruco">Truco</button>
                <button class="btn-action" id="btnRetruco">Retruco</button>
                <button class="btn-action" id="btnVale4">Vale 4</button>
                <button class="btn-action btn-rojo" id="btnMazo" style="margin-left:auto;">Al Mazo</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL DE RESULTADOS DE RONDA ===== -->
    <div id="roundResultModal" class="modal-overlay" style="display: none; flex-direction: column;">
        <div class="jerarquia-modal" style="text-align: center;">
            <h2 id="resultTitle" style="color: #f3b33d; font-size: 2rem; margin-bottom: 10px;">¡Ronda Terminada!</h2>
            <div id="resultScores" style="margin: 20px 0; font-size: 1.2rem; line-height: 2;">
                <!-- Puntos se llenan en JS -->
            </div>
            <div id="resultActions" style="display: flex; gap: 10px; justify-content: center;">
                <button id="btnSiguienteMano" class="btn-action btn-verde" style="display: none;">Siguiente
                    Mano</button>
                <button id="btnVolverLobby" class="btn-action btn-rojo" style="display: none;">Volver al Lobby</button>
                <div id="waitMsg" style="color: #aaa; font-style: italic; display: none;">Esperando al anfitrión...
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Jerarquía de Cartas (inicialmente oculto) -->
    <div id="jerarquiaModal" class="modal-overlay" style="display: none;">
        <div class="jerarquia-modal">
            <button class="close-btn" id="closeModalBtn">✕</button>
            <h3>⚡ JERARQUÍA TRUCO ⚡</h3>
            <ul class="jerarquia-list" id="jerarquiaList"></ul>
            <div class="nota">
                * Las cartas del mismo valor empatan (parda).<br>
                El 1 de espadas es la máxima (ancho de espadas).
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==================== CONFIGURACIÓN FIREBASE (ORIGINAL) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBq3DeZQz9-4gpOe2YyVPLRRAv8jsGcldk",
            authDomain: "juegoscartas-eac64.firebaseapp.com",
            databaseURL: "https://juegoscartas-eac64-default-rtdb.firebaseio.com",
            projectId: "juegoscartas-eac64",
            storageBucket: "juegoscartas-eac64.firebasestorage.app",
            messagingSenderId: "671826149545",
            appId: "1:671826149545:web:f9f706575f4d3df3b229b8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Sprite de cartas
        const IMAGE_FILE = "Baraja_española_completa.png";
        const PALO_FILA = { "oros": 0, "copas": 1, "espadas": 2, "bastos": 3 };
        let SPRITE_URL = null;

        function cardBG(carta) {
            if (!SPRITE_URL) return "background: #4a3727;";
            let fila = PALO_FILA[carta.palo];
            let col = carta.numero - 1;
            const xPercent = (col * 100) / 11;
            const yPercent = (fila * 100) / 4;
            return `background-image: url('${SPRITE_URL}'); background-position: ${xPercent}% ${yPercent}%; background-size: 1200% 500%; background-repeat: no-repeat;`;
        }

        function dorso() {
            if (!SPRITE_URL) return "background: #4a3727;";
            const xPercent = (1 * 100) / 11;
            const yPercent = (4 * 100) / 4;
            return `background-image: url('${SPRITE_URL}'); background-position: ${xPercent}% ${yPercent}%; background-size: 1200% 500%; background-repeat: no-repeat;`;
        }

        // ==================== INICIALIZACIÓN DE USUARIO / SALA ====================
        const urlParams = new URLSearchParams(window.location.search);
        let myId = urlParams.get('myId') || localStorage.getItem("chinchon_myId");
        if (!myId) { myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
        localStorage.setItem("chinchon_myId", myId);
        let myName = urlParams.get('myName') || localStorage.getItem("chinchon_myName") || "";
        let roomId = urlParams.get('roomId') || localStorage.getItem("chinchon_roomId") || null;
        let isHost = urlParams.has('isHost') ? (urlParams.get('isHost') === 'true') : (localStorage.getItem("esAnfitrion") === "true");

        // Variables del juego
        let players = [], otherPlayers = [];
        let gameRef = null, ultimoEstado = null;
        let myHand = [], currentTurn = null;
        let gameActive = false, selectedCard = null;
        let ultimoEstadoGalactico = null;
        let ultimoCantoGritadoTime = 0; // Para evitar duplicar sonidos de voz

        // DOM
        const handDiv = document.getElementById("myHand");
        const logDiv = document.getElementById("log");
        const turnText = document.getElementById("turnText");
        const btnJugarCarta = document.getElementById("btnJugarCarta");
        const configBtn = document.getElementById("configBtn");

        // Botones de cantos
        const btnEnvido = document.getElementById("btnEnvido");
        const btnRealEnvido = document.getElementById("btnRealEnvido");
        const btnFaltaEnvido = document.getElementById("btnFaltaEnvido");
        const btnQuiero = document.getElementById("btnQuiero");
        const btnNoQuiero = document.getElementById("btnNoQuiero");
        const btnTruco = document.getElementById("btnTruco");
        const btnRetruco = document.getElementById("btnRetruco");
        const btnVale4 = document.getElementById("btnVale4");
        const btnMazo = document.getElementById("btnMazo");

        // Modal Jerarquía
        const modalOverlay = document.getElementById("jerarquiaModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const jerarquiaList = document.getElementById("jerarquiaList");

        // ==================== DEFINICIÓN DE JERARQUÍA (para el modal y lógica) ====================
        const JERARQUIA_TRUCO = [
            { nombre: "Ancho de espadas", desc: "1 de espadas", valor: 14, palo: "espadas", numero: 1 },
            { nombre: "Ancho de bastos", desc: "1 de bastos", valor: 13, palo: "bastos", numero: 1 },
            { nombre: "Siete de espadas", desc: "7 de espadas", valor: 12, palo: "espadas", numero: 7 },
            { nombre: "Siete de oros", desc: "7 de oros", valor: 11, palo: "oros", numero: 7 },
            { nombre: "Tres", desc: "Todos los 3", valor: 10, palo: null, numero: 3 },
            { nombre: "Dos", desc: "Todos los 2", valor: 9, palo: null, numero: 2 },
            { nombre: "Ancho falso", desc: "1 de oros / 1 de copas", valor: 8, palo: null, numero: 1, excepto: ["espadas", "bastos"] },
            { nombre: "Doce", desc: "Todos los 12", valor: 7, palo: null, numero: 12 },
            { nombre: "Once", desc: "Todos los 11", valor: 6, palo: null, numero: 11 },
            { nombre: "Diez", desc: "Todos los 10", valor: 5, palo: null, numero: 10 },
            { nombre: "Siete falso", desc: "7 de copas / 7 de bastos", valor: 4, palo: null, numero: 7, excepto: ["espadas", "oros"] },
            { nombre: "Seis", desc: "Todos los 6", valor: 3, palo: null, numero: 6 },
            { nombre: "Cinco", desc: "Todos los 5", valor: 2, palo: null, numero: 5 },
            { nombre: "Cuatro", desc: "Todos los 4", valor: 1, palo: null, numero: 4 }
        ];

        // Función que llena el modal con la jerarquía
        function llenarModalJerarquia() {
            jerarquiaList.innerHTML = "";
            JERARQUIA_TRUCO.forEach((item, index) => {
                const li = document.createElement("li");

                // Número de ranking
                const rankSpan = document.createElement("span");
                rankSpan.className = "rank-number";
                rankSpan.textContent = `#${index + 1}`;
                li.appendChild(rankSpan);

                // Miniatura de carta representativa
                if (item.palo) {
                    // Carta específica
                    const mini = document.createElement("div");
                    mini.className = "carta-mini";
                    mini.style.cssText = cardBG({ palo: item.palo, numero: item.numero });
                    li.appendChild(mini);
                } else {
                    // Grupo de cartas: mostramos un placeholder o una miniatura genérica
                    const mini = document.createElement("div");
                    mini.className = "carta-mini";
                    // Buscamos un ejemplo: para "Tres" cualquier 3 de oros, etc.
                    let paloEjemplo = "oros";
                    if (item.numero === 1 && item.excepto) paloEjemplo = "oros"; // Ancho falso
                    else if (item.numero === 7 && item.excepto) paloEjemplo = "copas"; // Siete falso
                    mini.style.cssText = cardBG({ palo: paloEjemplo, numero: item.numero });
                    li.appendChild(mini);
                }

                // Texto descriptivo
                const textDiv = document.createElement("div");
                textDiv.style.flex = "1";
                textDiv.innerHTML = `<strong>${item.nombre}</strong><br><span style="font-size:0.8rem; color:#bbb;">${item.desc}</span>`;
                li.appendChild(textDiv);

                jerarquiaList.appendChild(li);
            });
        }

        // Mostrar modal
        function mostrarModalJerarquia() {
            modalOverlay.style.display = "flex";
        }

        // Ocultar modal
        function ocultarModalJerarquia() {
            modalOverlay.style.display = "none";
        }

        // Eventos del modal
        configBtn.addEventListener("click", mostrarModalJerarquia);
        closeModalBtn.addEventListener("click", ocultarModalJerarquia);
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) ocultarModalJerarquia();
        });

        // ==================== FUNCIONES AUXILIARES ====================
        function addLog(msg) {
            logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 10) logDiv.removeChild(logDiv.lastChild);
        }

        function calcularPuntosEnvido(mano) {
            if (!mano || mano.length === 0) return 0;
            let palos = {};
            mano.forEach(c => {
                let val = c.numero >= 10 ? 0 : c.numero;
                if (!palos[c.palo]) palos[c.palo] = [];
                palos[c.palo].push(val);
            });
            let maxEnvido = 0;
            for (let p in palos) {
                let vals = palos[p].sort((a, b) => b - a);
                let puntos = 0;
                if (vals.length >= 2) puntos = 20 + vals[0] + vals[1];
                else puntos = vals[0];
                if (puntos > maxEnvido) maxEnvido = puntos;
            }
            return maxEnvido;
        }

        function valorTruco(carta) {
            const { palo, numero } = carta;
            if (numero === 1 && palo === "espadas") return 14;
            if (numero === 1 && palo === "bastos") return 13;
            if (numero === 7 && palo === "espadas") return 12;
            if (numero === 7 && palo === "oros") return 11;
            if (numero === 3) return 10;
            if (numero === 2) return 9;
            if (numero === 1 && (palo === "oros" || palo === "copas")) return 8;
            if (numero === 12) return 7;
            if (numero === 11) return 6;
            if (numero === 10) return 5;
            if (numero === 7 && (palo === "copas" || palo === "bastos")) return 4;
            if (numero === 6) return 3;
            if (numero === 5) return 2;
            if (numero === 4) return 1;
            return 0;
        }

        function evaluarBazasTerminadas(mesa, jugadoresTotales) {
            let numBaza = Math.floor((mesa.length - 1) / jugadoresTotales) + 1;
            let cartasEnBaza = mesa.filter(m => m.baza === numBaza);
            let ganadorId = null, empate = false;
            if (cartasEnBaza.length === jugadoresTotales) {
                let mayorValor = -1, cartasGanadoras = [];
                cartasEnBaza.forEach(c => {
                    let v = valorTruco(c.card);
                    if (v > mayorValor) {
                        mayorValor = v;
                        cartasGanadoras = [c];
                    } else if (v === mayorValor) cartasGanadoras.push(c);
                });
                if (cartasGanadoras.length === 1) ganadorId = cartasGanadoras[0].playerId;
                else empate = true;
            }
            return { completa: cartasEnBaza.length === jugadoresTotales, ganadorId, empate, numBaza };
        }

        // ==================== ACTUALIZACIÓN DE INTERFAZ ====================
        function actualizarJuego() {
            if (!ultimoEstado) return;
            if (!myHand) myHand = [];
            let cp = (ultimoEstado && ultimoEstado.cantoPendiente) ? ultimoEstado.cantoPendiente : null;
            let mesaC = (ultimoEstado && ultimoEstado.mesa) ? ultimoEstado.mesa : [];
            let nivel = (ultimoEstado && ultimoEstado.nivelTruco) ? ultimoEstado.nivelTruco : 0;
            let duenio = (ultimoEstado && ultimoEstado.idDuenioTruco) ? ultimoEstado.idDuenioTruco : null;
            let ptsReal = (ultimoEstado && ultimoEstado.points) ? ultimoEstado.points : {};

            const row = document.getElementById("playersRow");
            row.innerHTML = "";
            let yo = players.find(p => p.id === myId);
            if (yo) row.innerHTML += `<div class="player-score">Tú <span>${ptsReal[myId] || 0}</span></div>`;
            otherPlayers.forEach(p => row.innerHTML += `<div class="player-score">${p.name} <span style="color:#2196F3">${ptsReal[p.id] || 0}</span></div>`);

            handDiv.innerHTML = "";
            let count = myHand.length;
            myHand.forEach((c, i) => {
                const div = document.createElement("div");
                div.className = `carta ${selectedCard === i ? "selected" : ""}`;
                div.style.cssText = cardBG(c);
                let angle = 0, offset = 0;
                if (count === 3) {
                    if (i === 0) { angle = -15; offset = 10; }
                    if (i === 1) { angle = 0; offset = -10; div.style.zIndex = "15"; }
                    if (i === 2) { angle = 15; offset = 10; div.style.zIndex = "10"; }
                } else if (count === 2) {
                    if (i === 0) { angle = -10; offset = 5; }
                    if (i === 1) { angle = 10; offset = 5; }
                }
                if (selectedCard !== i) div.style.transform = `rotate(${angle}deg) translateY(${offset}px)`;
                if (i > 0) div.style.marginLeft = "-40px";
                div.onclick = () => {
                    if (cp) return;
                    selectedCard = selectedCard === i ? null : i;
                    actualizarJuego();
                };
                handDiv.appendChild(div);
            });

            let baza1HTML = "", baza2HTML = "", baza3HTML = "";
            mesaC.forEach(m => {
                let cardDiv = `<div class="carta small" style="${cardBG(m.card)}"></div>`;
                if (m.baza === 1) baza1HTML += cardDiv;
                else if (m.baza === 2) baza2HTML += cardDiv;
                else if (m.baza === 3) baza3HTML += cardDiv;
            });
            document.getElementById("baza1").innerHTML = baza1HTML;
            document.getElementById("baza2").innerHTML = baza2HTML;
            document.getElementById("baza3").innerHTML = baza3HTML;

            // Mostrar Resultados de Bazas
            let resultadosBazas = (ultimoEstado && ultimoEstado.ganadoresBazas) ? ultimoEstado.ganadoresBazas : [];
            for (let i = 1; i <= 3; i++) {
                let resDiv = document.getElementById("resBaza" + i);
                if (resultadosBazas[i - 1]) {
                    let gId = resultadosBazas[i - 1];
                    let texto = "";
                    if (gId === "empate") texto = "🤝 PARDA";
                    else if (gId === myId) texto = "⭐ GANASTE";
                    else texto = "🚩 GANA RIVAL";
                    
                    resDiv.innerHTML = texto;
                    resDiv.style.display = "block";
                } else {
                    resDiv.style.display = "none";
                }
            }

            const showRespuestas = (cp && cp.bloqueado === myId);
            document.getElementById("respuestasRow").style.display = showRespuestas ? "flex" : "none";

            // Botones de Envido: Visibles si no se jugó carta y no hay envido saldado
            // El Envido lo puede cantar CUALQUIERA al inicio (Regla de interrupción)
            let puedeRevirarEnvido = false;
            if (cp && cp.bloqueado === myId && cp.tipo.includes("envido")) {
                if (!cp.tipo.includes("falta")) puedeRevirarEnvido = true;
            }

            const yaSeJugoCarta = mesaC.length > 0;
            const envidoSaldado = (ultimoEstado && ultimoEstado.envidoFinalizado);
            
            // Permitimos ver botones de envido si nadie jugó carta, sin importar el turno
            document.getElementById("cantosEnvidoRow").style.display = (!yaSeJugoCarta && !envidoSaldado && (!cp || puedeRevirarEnvido)) ? "flex" : "none";
            
            if (cp && cp.tipo.includes("envido")) {
                document.getElementById("btnEnvido").style.display = "none";
                if (cp.tipo.includes("real")) document.getElementById("btnRealEnvido").style.display = "none";
            } else {
                document.getElementById("btnEnvido").style.display = "block";
                document.getElementById("btnRealEnvido").style.display = "block";
            }

            // Botones de Truco: Visibles si no es el nivel máximo
            let puedeRevirarTruco = false;
            if (cp && cp.bloqueado === myId && ["truco", "retruco"].includes(cp.tipo)) {
                if (cp.tipo === "truco" || cp.tipo === "retruco") puedeRevirarTruco = true;
            }

            btnTruco.style.display = (nivel === 0 && !cp && currentTurn === myId) ? "block" : "none";
            btnRetruco.style.display = ((nivel === 1 && duenio !== myId && !cp && currentTurn === myId) || (cp && cp.tipo === "truco" && cp.bloqueado === myId)) ? "block" : "none";
            btnVale4.style.display = ((nivel === 2 && duenio !== myId && !cp && currentTurn === myId) || (cp && cp.tipo === "retruco" && cp.bloqueado === myId)) ? "block" : "none";
            
            document.getElementById("cantosTrucoRow").style.display = ((!cp && nivel < 3 && currentTurn === myId) || puedeRevirarTruco) ? "flex" : "none";

            btnJugarCarta.style.display = (selectedCard !== null && currentTurn === myId && !cp) ? "block" : "none";

            if (currentTurn === myId && !showRespuestas) {
                turnText.innerHTML = "🎯 TU TURNO";
                turnText.className = "turno mio";
            } else if (showRespuestas) {
                turnText.innerHTML = `⚠️ ¡TE CANTARON ${cp.tipo.toUpperCase()}!`;
                turnText.className = "turno mio";
            } else {
                let nom = otherPlayers.find(p => p.id === currentTurn)?.name || "otro";
                turnText.innerHTML = `⏳ Turno de ${nom}`;
                turnText.className = "turno";
            }

            // GESTIÓN DEL MODAL DE RESULTADOS
            const modal = document.getElementById("roundResultModal");
            if (!ultimoEstado.rondaEnCurso) {
                modal.style.display = "flex";
                let rScores = document.getElementById("resultScores");
                rScores.innerHTML = players.map(p => {
                    let pts = (ultimoEstado.points && ultimoEstado.points[p.id]) || 0;
                    let esGanador = (ultimoEstado.winner === p.id);
                    return `<div class="score-row-result ${esGanador ? 'winner' : ''}">
                                <span>${p.name} ${p.id === myId ? '(Tú)' : ''}</span>
                                <b>${pts}</b>
                            </div>`;
                }).join("");

                let maxPts = (ultimoEstado.config && ultimoEstado.config.maxPts) || 30;
                let alguienGanoMatch = players.some(p => (ultimoEstado.points && ultimoEstado.points[p.id]) >= maxPts);

                if (isHost) {
                    if (alguienGanoMatch) {
                        document.getElementById("btnSiguienteMano").style.display = "none";
                        document.getElementById("btnVolverLobby").style.display = "block";
                        document.getElementById("btnVolverLobby").onclick = terminarPartidaDefinitivamente;
                        document.getElementById("resultTitle").innerText = "🏆 ¡PARTIDA TERMINADA! 🏆";
                    } else {
                        document.getElementById("btnSiguienteMano").style.display = "block";
                        document.getElementById("btnVolverLobby").style.display = "none";
                        document.getElementById("btnSiguienteMano").onclick = proximaManoHost;
                        document.getElementById("resultTitle").innerText = "Fin de la Mano";
                    }
                    document.getElementById("waitMsg").style.display = "none";
                } else {
                    document.getElementById("btnSiguienteMano").style.display = "none";
                    document.getElementById("btnVolverLobby").style.display = "none";
                    document.getElementById("waitMsg").style.display = "block";
                    if (alguienGanoMatch) document.getElementById("resultTitle").innerText = "🏆 ¡PARTIDA TERMINADA! 🏆";
                }
            } else {
                modal.style.display = "none";
            }
        }

        // LÓGICA DE CONTINUIDAD (Solo Host)
        function mezclar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function proximaManoHost() {
            if (!isHost) return;
            hablar("Nueva mano. ¡Suerte!");

            // 1. Crear nueva baraja de Truco
            let baraja = [];
            let palos = ["oros", "copas", "espadas", "bastos"];
            for (let p of palos) {
                for (let n = 1; n <= 12; n++) {
                    if (n !== 8 && n !== 9) baraja.push({ palo: p, numero: n });
                }
            }
            let mazo = mezclar(baraja);
            let manos = {};
            players.forEach(p => {
                manos[p.id] = [mazo.pop(), mazo.pop(), mazo.pop()];
            });

            // 2. Determinar quién es mano (el siguiente al anterior que empezó)
            // Simplificado: rotar turno base
            let primerJugador = players[0].id;
            if (ultimoEstado.firstPlayerThisRound === players[0].id) {
                primerJugador = players[1].id;
            }

            // 3. Update Estado
            gameRef.child("gameState").update({
                deck: mazo,
                hands: manos,
                mesa: [],
                ganadoresBazas: [],
                currentTurn: primerJugador,
                firstPlayerThisRound: primerJugador,
                rondaEnCurso: true,
                winner: null,
                // Mantener puntos
                envidoFinalizado: false,
                nivelTruco: 0,
                idDuenioTruco: null,
                valorMano: 1,
                lastLog: { msg: "🎴 <b>Nueva mano repartida.</b>", time: Date.now() }
            });
        }

        function terminarPartidaDefinitivamente() {
            if (!isHost) return;
            // Sincronizar puntos finales en la lista de jugadores de la raíz
            let ptsReal = ultimoEstado.points || {};
            let actualizaciones = { status: "finished" }; // finished o waiting para volver al lobby

            players.forEach((p, index) => {
                actualizaciones[`players/${index}/points`] = ptsReal[p.id] || 0;
            });

            // También borramos el gameState para que index.html vea que ya se puede resetear
            actualizaciones["gameState"] = null;
            gameRef.update(actualizaciones);
        }

        // ==================== SÍNTESIS DE VOZ ====================
        function hablar(texto) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-AR';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        // ==================== CANTOS Y RESPUESTAS ====================
        function realizarCanto(tipo) {
            let cp = ultimoEstado.cantoPendiente;
            let mesaC = ultimoEstado?.mesa || [];
            let nivel = ultimoEstado?.nivelTruco || 0;
            let duenio = ultimoEstado?.idDuenioTruco;

            if (!gameActive) return;
            
            // Un canto de Truco solo se puede hacer en el turno propio
            // Pero el Envido lo puede cantar cualquiera al inicio de la mano
            let esEnvidoInicial = tipo.includes("envido") && mesaC.length === 0;

            if (!cp && currentTurn !== myId && !esEnvidoInicial) {
                alert("No es tu turno de cantar."); 
                return;
            }
            
            if (cp && cp.bloqueado !== myId) return; 

            // Validaciones de Truco/Retruco/Vale 4
            if (tipo === "truco" && (nivel > 0 || (cp && cp.tipo === "truco"))) { alert("Ya se cantó Truco"); return; }
            if (tipo === "retruco" && (nivel !== 1 && (!cp || cp.tipo !== "truco"))) { alert("Solo se puede retrucar después de Truco"); return; }
            if (tipo === "vale 4" && (nivel !== 2 && (!cp || cp.tipo !== "retruco"))) { alert("Solo se puede Vale Cuatro después de Retruco"); return; }
            
            if ((tipo === "retruco" || tipo === "vale 4") && duenio === myId && !cp) {
                alert("No puedes subir la apuesta si tienes el 'Quiero'");
                return;
            }

            if (tipo.includes("envido") && (ultimoEstado.envidoFinalizado || mesaC.length > 0)) {
                alert("No se puede cantar envido ahora");
                return;
            }

            let bloqueado = otherPlayers[0].id;
            let time = Date.now();
            let ptsQuiero = 0, ptsNoQuiero = 1;
            let nuevoTipo = tipo;

            // Lógica de REVIRE de Envido
            if (tipo.includes("envido") && cp && cp.tipo.includes("envido")) {
                ptsNoQuiero = cp.ptsQuiero || 1;
                if (tipo === "falta envido") {
                    // Si juegan a 30 y están en las malas, el Falta Envido suele dar el partido (o 15/20 pts)
                    // Por ahora lo dejamos en 15 como "muerte súbita" de la mitad, 
                    // o podrías poner 30 para ganar directo.
                    ptsQuiero = 15; 
                } else {
                    let valorActual = (tipo === "envido") ? 2 : 3;
                    ptsQuiero = (cp.ptsQuiero || 0) + valorActual;
                }
                nuevoTipo = cp.tipo + ", " + tipo;
            } else if (tipo.includes("envido")) {
                ptsQuiero = (tipo === "envido") ? 2 : (tipo === "real envido" ? 3 : 15);
                ptsNoQuiero = 1;
            }

            let actualizaciones = {
                "gameState/cantoPendiente": { 
                    tipo: nuevoTipo, 
                    iniciador: myId, 
                    bloqueado, 
                    time: time,
                    ptsQuiero: ptsQuiero,
                    ptsNoQuiero: ptsNoQuiero
                },
                "gameState/lastLog": { msg: `📣 <b>${myName} dice:</b> "¡${tipo.toUpperCase()}!"`, time: time }
            };
            
            ultimoCantoGritadoTime = time;
            hablar(tipo);
            gameRef.update(actualizaciones);
        }

        function procesarRespuestaCanto(quiere) {
            let cp = ultimoEstado.cantoPendiente;
            if (!cp || cp.bloqueado !== myId) return;

            hablar(quiere ? "¡Quiero!" : "No quiero");
            let actualizaciones = { "gameState/cantoPendiente": null };
            let ptsActuales = ultimoEstado.points || {};

            if (cp.tipo.includes("envido")) {
                actualizaciones["gameState/envidoFinalizado"] = true;
                if (quiere) {
                    let misPuntos = calcularPuntosEnvido(myHand);
                    let oponenteMano = ultimoEstado.hands?.[cp.iniciador] || [];
                    let susPuntos = calcularPuntosEnvido(oponenteMano);
                    let puntosEnJuego = cp.ptsQuiero || (cp.tipo === "envido" ? 2 : (cp.tipo === "real envido" ? 3 : 15));
                    let ganadorEnvido = (misPuntos > susPuntos) ? myId : cp.iniciador;
                    let perdedorEnvido = (ganadorEnvido === myId) ? cp.iniciador : myId;
                    
                    let nomG = (ganadorEnvido === myId) ? "Tú" : (players.find(p => p.id === ganadorEnvido)?.name || "Oponente");
                    let nomP = (perdedorEnvido === myId) ? "Tú" : (players.find(p => p.id === perdedorEnvido)?.name || "Oponente");
                    let msgB = (Math.abs(misPuntos - susPuntos) > 5) ? `${nomP}: "Son buenas".` : `📣 Se mostraron los puntos.`;
                    
                    let msg = `✅ <b>${myName} dice:</b> "¡QUIERO!"<br>${msgB}<br>🏆 ${nomG}: ${ganadorEnvido === myId ? misPuntos : susPuntos}, ${nomP}: ${perdedorEnvido === myId ? misPuntos : susPuntos}<br>✨ ${nomG} gana +${puntosEnJuego} pts.`;
                    actualizaciones[`gameState/points/${ganadorEnvido}`] = (ptsActuales[ganadorEnvido] || 0) + puntosEnJuego;
                    actualizaciones["gameState/lastLog"] = { msg, time: Date.now() };
                } else {
                    let puntosRegalados = cp.ptsNoQuiero || 1;
                    let ptsIniciador = (ptsActuales[cp.iniciador] || 0) + puntosRegalados;
                    let nomIniciador = players.find(p => p.id === cp.iniciador)?.name || "Rival";
                    actualizaciones[`gameState/points/${cp.iniciador}`] = ptsIniciador;
                    actualizaciones["gameState/lastLog"] = { msg: `🚩 <b>${myName} dice:</b> "No quiero".<br>💰 ${nomIniciador} suma +${puntosRegalados} pts por el envive.`, time: Date.now() };
                }
            }
            else if (["truco", "retruco", "vale 4"].includes(cp.tipo)) {
                if (quiere) {
                    let nuevoNivel = cp.tipo === "truco" ? 1 : (cp.tipo === "retruco" ? 2 : 3);
                    let nuevoValor = cp.tipo === "truco" ? 2 : (cp.tipo === "retruco" ? 3 : 4);
                    actualizaciones["gameState/nivelTruco"] = nuevoNivel;
                    actualizaciones["gameState/valorMano"] = nuevoValor;
                    actualizaciones["gameState/idDuenioTruco"] = myId;
                    actualizaciones["gameState/lastLog"] = { msg: `🤝 <b>${myName} dice:</b> "¡QUIERO!"<br>🔥 La mano ahora vale ${nuevoValor} pts.`, time: Date.now() };
                } else {
                    let puntosRegalados = cp.tipo === "truco" ? 1 : (cp.tipo === "retruco" ? 2 : 3);
                    let ptsIniciador = (ptsActuales[cp.iniciador] || 0) + puntosRegalados;
                    let nomIniciador = players.find(p => p.id === cp.iniciador)?.name || "Rival";
                    actualizaciones[`gameState/points/${cp.iniciador}`] = ptsIniciador;
                    actualizaciones["gameState/rondaEnCurso"] = false;
                    actualizaciones["gameState/lastLog"] = { msg: `🚩 <b>${myName} dice:</b> "No quiero".<br>🏆 ${nomIniciador} gana +${puntosRegalados} pts por el truco.`, time: Date.now() };
                }
            }
            gameRef.update(actualizaciones);
        }

        // ==================== JUGAR CARTA Y EVALUAR MANO ====================
        function obtenerSiguienteVivo(actualId) {
            let idx = players.findIndex(p => p.id === actualId);
            return players[(idx + 1) % players.length].id;
        }

        btnJugarCarta.onclick = () => {
            if (!gameActive || currentTurn !== myId || selectedCard === null) return;
            let cartaObj = myHand.splice(selectedCard, 1)[0];
            let mesa = ultimoEstado?.mesa || [];
            let numBazaActual = Math.floor(mesa.length / players.length) + 1;
            mesa.push({ card: cartaObj, playerId: myId, baza: numBazaActual });

            let evalBaza = evaluarBazasTerminadas(mesa, players.length);
            let ganadoresBazas = ultimoEstado.ganadoresBazas || [];
            let ganadorBazaMsg = "";
            let next = null;

            if (evalBaza.completa) {
                if (evalBaza.empate) {
                    ganadoresBazas.push("empate");
                    ganadorBazaMsg = `🤝 Parda en Baza ${evalBaza.numBaza}`;
                    next = obtenerSiguienteVivo(myId);
                } else {
                    ganadoresBazas.push(evalBaza.ganadorId);
                    let nomG = players.find(p => p.id === evalBaza.ganadorId)?.name || "Rival";
                    ganadorBazaMsg = `🏆 ${nomG} gana Baza ${evalBaza.numBaza}`;
                    next = evalBaza.ganadorId;
                }
            } else {
                next = obtenerSiguienteVivo(myId);
            }

            let manoTerminada = false, ganadorMano = null;
            let contBazas = {};
            ganadoresBazas.forEach(g => { if (g !== "empate") contBazas[g] = (contBazas[g] || 0) + 1; });
            Object.keys(contBazas).forEach(pid => { if (contBazas[pid] >= 2) { manoTerminada = true; ganadorMano = pid; } });
            if (ganadoresBazas.length === 3 && !manoTerminada) {
                manoTerminada = true;
                if (ganadoresBazas[0] === "empate" && ganadoresBazas[1] !== "empate") ganadorMano = ganadoresBazas[1];
                else ganadorMano = players[0].id;
            }

            let actualizaciones = {};
            actualizaciones[`gameState/hands/${myId}`] = myHand;
            actualizaciones[`gameState/mesa`] = mesa;
            actualizaciones[`gameState/ganadoresBazas`] = ganadoresBazas;

            if (manoTerminada) {
                let valorMano = ultimoEstado?.valorMano || 1;
                let ptsGanador = (ultimoEstado.points?.[ganadorMano] || 0) + valorMano;
                actualizaciones[`gameState/points/${ganadorMano}`] = ptsGanador;
                actualizaciones[`gameState/rondaEnCurso`] = false;
                actualizaciones[`gameState/winner`] = ganadorMano;
                actualizaciones[`gameState/currentTurn`] = null;
                let nomG = players.find(p => p.id === ganadorMano)?.name || "Alguien";
                actualizaciones[`gameState/lastLog`] = { msg: `<b>${nomG} dice:</b> "¡Gané la mano!". Recibe +${valorMano} pts.<br>${ganadorBazaMsg}`, time: Date.now() };
            } else {
                actualizaciones[`gameState/currentTurn`] = next;
                actualizaciones[`gameState/lastLog`] = { msg: `🃏 <b>${myName}</b> tiró una carta al tapete.<br>${ganadorBazaMsg}`, time: Date.now() };
            }

            selectedCard = null;
            gameRef.update(actualizaciones);
        };

        // ==================== INICIALIZACIÓN Y SINCRONIZACIÓN ====================
        function iniciarJuego(estado) {
            ultimoEstado = estado;
            myHand = estado.hands?.[myId] || [];
            currentTurn = estado.currentTurn;
            gameActive = true;
            selectedCard = null;
            otherPlayers = players.filter(p => p.id !== myId).map(p => ({
                id: p.id, name: p.name, points: estado.points?.[p.id] || 0
            }));

            if (estado.cantoPendiente && estado.cantoPendiente.iniciador !== myId) {
                if (estado.cantoPendiente.time > ultimoCantoGritadoTime) {
                    ultimoCantoGritadoTime = estado.cantoPendiente.time;
                    hablar(estado.cantoPendiente.tipo);
                }
            }

            if (estado.lastLog && estado.lastLog.msg) {
                logDiv.innerHTML = estado.lastLog.msg;
                // Scroll al fondo si el log fuera muy largo, aunque aquí es una sola línea
            }

            actualizarJuego();
            ultimoEstadoGalactico = estado;
        }

        // Asignar eventos de botones
        btnEnvido.onclick = () => realizarCanto("envido");
        btnRealEnvido.onclick = () => realizarCanto("real envido");
        btnFaltaEnvido.onclick = () => realizarCanto("falta envido");
        btnTruco.onclick = () => realizarCanto("truco");
        btnRetruco.onclick = () => realizarCanto("retruco");
        btnVale4.onclick = () => realizarCanto("vale 4");
        btnQuiero.onclick = () => procesarRespuestaCanto(true);
        btnNoQuiero.onclick = () => procesarRespuestaCanto(false);
            btnMazo.onclick = () => {
            if (confirm("¿Seguro que querés irte al mazo? Regalarás la mano.")) {
                hablar("¡Me voy al mazo!");
                let rivalId = otherPlayers[0].id;
                let rivalNom = otherPlayers[0].name || "Rival";
                let valorMano = ultimoEstado?.valorMano || 1;
                let ptsActuales = ultimoEstado?.points || {};
                let nuevosPts = { ...ptsActuales, [rivalId]: (ptsActuales[rivalId] || 0) + valorMano };
                gameRef.update({
                    "gameState/points": nuevosPts,
                    "gameState/rondaEnCurso": false,
                    "gameState/cantoPendiente": null,
                    "gameState/lastLog": { msg: `🏳️ <b>${myName} dice:</b> "¡Al mazo!".<br>🏆 ${rivalNom} gana +${valorMano} pts de la mano.`, time: Date.now() }
                });
            }
        };

        document.getElementById("quitGameBtn").onclick = () => {
            if (confirm("¿Estás seguro de que querés salir?")) {
                if (isHost && gameRef) {
                    gameRef.remove();
                } else if (gameRef && myId) {
                    // Eliminarme y avisar
                    let nuevosPlayers = players.filter(p => p.id !== myId);
                    let logMsg = { msg: `🚨 <b>${myName || 'Un jugador'}</b> ha salido de la partida.`, time: Date.now() };
                    gameRef.update({
                        players: nuevosPlayers,
                        "gameState/lastLog": logMsg
                    });
                }
                localStorage.removeItem("chinchon_roomId");
                localStorage.removeItem("esAnfitrion");
                window.location.href = "index.html";
            }
        };

        window.addEventListener('load', () => {
            const img = new Image();
            img.onload = () => {
                SPRITE_URL = IMAGE_FILE;
                llenarModalJerarquia(); // Llenar el modal con las miniaturas correctas
                actualizarJuego();
            };
            img.src = IMAGE_FILE;

            if (roomId) {
                gameRef = db.ref("games/" + roomId);
                gameRef.once("value", (snap) => {
                    if (snap.exists()) {
                        gameRef.on("value", (s) => {
                            let data = s.val();
                            if (data && data.status === "playing" && data.gameState) {
                                players = data.players || [];
                                iniciarJuego(data.gameState);
                            } else {
                                // Si no hay data es porque el host borró la sala
                                if (!data) alert("El anfitrión ha cerrado la sala.");
                                window.location.href = "index.html";
                            }
                        });
                    } else { window.location.href = "index.html"; }
                });
            }
        });
    </script>
</body>

</html>
