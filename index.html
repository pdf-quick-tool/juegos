<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chinchón Online - Firebase</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .screen {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
        }
        h1 { color: #2c5a2a; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
        }
        button { background: #f3b33d; cursor: pointer; box-shadow: 0 3px 0 #7a4c1a; }
        button:active { transform: translateY(2px); }
        .btn-green { background: #2e7d32; color: white; }
        .code-box {
            background: #2c1a10;
            color: #ffd966;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.5rem;

            margin: 15px 0;

            list-style: none;

            overflow-y: auto;
        }
        .players-list li {
            background: #e0e0e0;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
        }
        .hidden { display: none; }
        .status {
            padding: 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .status-ok { background: #c8e6c9; color: #2e7d32; }
        .status-wait { background: #fff3e0; color: #e65100; }
        
        /* Juego */
        .players-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; }

            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            min-width: 90px;
            text-align: center;
        }

            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
        }

        .my-hand {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .card-pile {
            width: 80px; 
            height: 123px; /* Proporción corregida */
            background: #2c1a10;
            border-radius: 10px;
            border: 2px solid #ffd966;
            cursor: pointer;
        }

        .carta {
            width: 80px; 
            height: 123px; /* Proporción corregida */
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px black;
        }
        .carta.selected { transform: translateY(-12px); filter: drop-shadow(0 0 8px gold); }
        .game-buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        button { width: auto; padding: 10px 18px; }
.log {
    background: rgba(0,0,0,0.5);
    color: #f7eac5;
    border-radius: 15px;
    padding: 10px;
    font-size: 0.8rem;
    margin-top: 10px;
    max-height: 100px;
    overflow-y: auto;
}
.turno {
    /* Ya no es fixed al fondo */
    position: relative; 
    margin: 10px auto;
    width: fit-content;
    padding: 8px 25px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 10;
}
        .turno.mio { background: #4caf50; color: white; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
            100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
        }
        @media (max-width: 500px) {
            .carta { width: 62px; height: 95px; }
            .card-pile { width: 70px; height: 107px; }
        }
    </style>
</head>

<script>

// --- AUDIO ---
const sfx = {
    turno: new Audio('sounds/turno.mp3'),
    ganar: new Audio('sounds/ganar.mp3'),
    perder: new Audio('sounds/perder.mp3'),
    carta: new Audio('sounds/carta.mp3')
};

function playSfx(nombre) {
    sfx[nombre].currentTime = 0;
    sfx[nombre].play().catch(() => {}); // El catch evita errores si el navegador bloquea el audio
}

    // ============================================================
    // 🃏 IMAGEN DE LA BARAJA
    // ============================================================
    const IMAGE_FILE = "Baraja_española_completa.png";
const CARD_W = 208, CARD_H = 319; 
const SPRITE_W = 2496, SPRITE_H = 1595;
    const PALO_FILA = { "oros": 0, "copas": 1, "espadas": 2, "bastos": 3 };
    let SPRITE_URL = null;
    
function cardBG(carta) {
    if (!SPRITE_URL) return "background: #4a3727;";
    let fila, col;
    if (carta.comodin) { 
        fila = 4; col = 0; 
    } else { 
        fila = PALO_FILA[carta.palo]; 
        col = carta.numero - 1; 
    }
    
    // La imagen tiene 12 columnas (0 a 11) y 5 filas (0 a 4)
    // Usamos porcentajes exactos para que el navegador recorte bien en cualquier zoom
    const xPercent = (col * 100) / 11; 
    const yPercent = (fila * 100) / 4;  
    
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}



function dorso() {
    if (!SPRITE_URL) return "background: #4a3727;";
    // El dorso está en la fila 5, columna 2 (índice 4, 1)
    const xPercent = (1 * 100) / 11;
    const yPercent = (4 * 100) / 4;
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}


    // ============================================================
    // 🎮 LÓGICA DEL JUEGO
    // ============================================================
    const PALOS = ["oros", "copas", "espadas", "bastos"];
    
    function crearBaraja() {
        let b = [];
        for(let p of PALOS) for(let n=1; n<=12; n++) b.push({ palo: p, numero: n, comodin: false });
        b.push({ palo: "comodin", numero: 0, comodin: true });
        return b;
    }
    
    function mezclar(a) { for(let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function valorCarta(c) { if(c.comodin) return 0; if(c.numero >= 10) return 10; return c.numero; }
    
function puntosSueltas(mano) {
    if (!mano || mano.length === 0) return 0;

    const normales = mano.filter(c => !c.comodin);
    const cantComodines = mano.filter(c => c.comodin).length;

    // Función principal que prueba todas las rutas
    function resolver(cartas, comodines) {
        if (cartas.length === 0) return 0;

        let mejorPuntaje = calcularSuma(cartas);

        // 1. Intentar buscar ESCALERAS
        for (let i = 0; i < cartas.length; i++) {
            for (let j = i + 1; j < cartas.length; j++) {
                // Buscamos una tercera carta o usamos un comodín para completar 3
                for (let k = j + 1; k <= cartas.length; k++) {
                    let combo = [cartas[i], cartas[j]];
                    let usados = 0;
                    
                    if (k < cartas.length) combo.push(cartas[k]);
                    else if (comodines > 0) usados = 1;
                    else continue;

                    if (esEscaleraValida(combo, usados)) {
                        let resto = filtrarCartas(cartas, combo);
                        mejorPuntaje = Math.min(mejorPuntaje, resolver(resto, comodines - usados));
                    }
                }
            }
        }

        // 2. Intentar buscar GRUPOS
        for (let i = 0; i < cartas.length; i++) {
            for (let j = i + 1; j < cartas.length; j++) {
                let combo = [cartas[i], cartas[j]];
                let usados = 0;
                
                // Probamos con una tercera carta o con un comodín
                for (let k = j + 1; k <= cartas.length; k++) {
                    let subCombo = [...combo];
                    let subUsados = 0;
                    if (k < cartas.length) subCombo.push(cartas[k]);
                    else if (comodines > 0) subUsados = 1;
                    else continue;

                    if (esGrupoValido(subCombo, subUsados)) {
                        let resto = filtrarCartas(cartas, subCombo);
                        mejorPuntaje = Math.min(mejorPuntaje, resolver(resto, comodines - subUsados));
                    }
                }
            }
        }

        return mejorPuntaje;
    }

    // Funciones auxiliares de validación
    function esEscaleraValida(c, com) {
        if (c.length + com < 3) return false;
        let p = c[0].palo;
        if (!c.every(item => item.palo === p)) return false;
        let nums = c.map(item => item.numero).sort((a,b) => a-b);
        // Validamos huecos con comodines
        let huecos = 0;
        for (let i = 0; i < nums.length - 1; i++) {
            huecos += (nums[i+1] - nums[i] - 1);
        }
        return huecos <= com;
    }

    function esGrupoValido(c, com) {
        if (c.length + com < 3) return false;
        let n = c[0].numero;
        let palos = new Set(c.map(item => item.palo));
        return c.every(item => item.numero === n) && palos.size === c.length;
    }

    function filtrarCartas(todas, usadas) {
        let resultado = [...todas];
        usadas.forEach(u => {
            let idx = resultado.findIndex(r => r.numero === u.numero && r.palo === u.palo);
            if (idx !== -1) resultado.splice(idx, 1);
        });
        return resultado;
    }

    function calcularSuma(c) {
        return c.reduce((acc, curr) => acc + valorCarta(curr), 0);
    }

    return resolver(normales, cantComodines);
}

    
function puedeCerrar(mano) {
    if (mano.length < 8) return false;

    // Leemos la configuración que mandó el Host desde el estado global
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) 
                 ? ultimoEstadoGalactico.config.limiteCierre 
                 : 5;

    let minimoPuntosPosibles = 999;

    for (let i = 0; i < mano.length; i++) {
        let manoParaEvaluar = [...mano];
        manoParaEvaluar.splice(i, 1); 
        
        let pts = puntosSueltas(manoParaEvaluar);
        if (pts < minimoPuntosPosibles) {
            minimoPuntosPosibles = pts;
        }
    }

    return minimoPuntosPosibles <= limite;
}

    // ============================================================
    // 🔥 MULTIJUGADOR Y PERSISTENCIA
    // ============================================================
    
    // Recuperamos o generamos el ID único del dispositivo
    let ultimoEstadoGalactico = null; 
    let myId = localStorage.getItem("chinchon_myId");
    if (!myId) {
        myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("chinchon_myId", myId);
    }

    // Recuperamos el nombre si ya lo usó antes
    let myName = localStorage.getItem("chinchon_myName") || "";

    let roomId = null, isHost = false;
    let players = [], gameRef = null;
    let myHand = [], deck = [], discardPile = [], currentTurn = null;
    let gameActive = false, rondaEnCurso = false, hasDrawn = false, selectedCard = null;
    let myPoints = 0, otherPlayers = [];

    // DOM
    const startScreen = document.getElementById("startScreen");
    const lobbyScreen = document.getElementById("lobbyScreen");
    const gameScreen = document.getElementById("gameScreen");
    const statusMsg = document.getElementById("statusMsg");
    const codeDisplay = document.getElementById("codeDisplay");
    const playersList = document.getElementById("playersList");
    const lobbyStatus = document.getElementById("lobbyStatus");
    const startGameBtn = document.getElementById("startGameBtn");
    const playersRow = document.getElementById("playersRow");
    const deckPile = document.getElementById("deckPile");
    const deckCount = document.getElementById("deckCount");
    const discardPileDiv = document.getElementById("discardPile");
    const myHandDiv = document.getElementById("myHand");
    const logDiv = document.getElementById("log");
    const turnText = document.getElementById("turnText");
    const closeBtn = document.getElementById("closeBtn");
    
    function addLog(msg) { 
    logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML; 
    if(logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild); 
}
    
    function generarCodigo() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generarId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    // UI del juego
    function actualizarJuego() {
    // 1. Inicialización de seguridad
    if (!deck) deck = [];
    if (!myHand) myHand = [];
    if (!discardPile) discardPile = [];
    if (!otherPlayers) otherPlayers = [];

    // 2. Dibujar Oponentes
    playersRow.innerHTML = "";
    for(let p of otherPlayers) {
        const div = document.createElement("div");
        div.className = `player-card ${currentTurn === p.id ? "active" : ""}`;
        div.innerHTML = `<div class="player-name">${p.name}</div><div class="player-points">${p.points || 0} pts</div>`;
        playersRow.appendChild(div);
    }
    
    // 3. Mazo y Descarte
    deckPile.style.cssText = dorso();
    deckCount.innerText = deck.length;
    
    if(discardPile.length > 0) {
        discardPileDiv.style.cssText = cardBG(discardPile[discardPile.length-1]);
    } else {
        discardPileDiv.style.cssText = "background: #4a3727;";
    }
    
    // 4. Mi mano
    myHandDiv.innerHTML = "";
    myHand.forEach((c, i) => {
        const div = document.createElement("div");
        div.className = `carta ${selectedCard === i ? "selected" : ""}`;
        div.style.cssText = cardBG(c);
        // Solo podés seleccionar carta si es tu turno y YA ROBASTE
        if(gameActive && rondaEnCurso && currentTurn === myId && hasDrawn) {
            div.onclick = () => { selectedCard = selectedCard === i ? null : i; actualizarJuego(); };
        }
        myHandDiv.appendChild(div);
    });
    
    // 5. Lógica del Turno (Texto)
    if(currentTurn === myId && gameActive && rondaEnCurso) {
        turnText.innerHTML = "🎯 TU TURNO";
        turnText.className = "turno mio";
    } else if(gameActive && rondaEnCurso) {
        let nom = otherPlayers.find(p=>p.id===currentTurn)?.name || "otro";
        turnText.innerHTML = `⏳ Turno de ${nom}`;
        turnText.className = "turno";
    }
    
    // 6. Lógica del Botón CERRAR (¡Corregida!)
    const puedeCerrarAhora = gameActive && rondaEnCurso && currentTurn === myId && hasDrawn && puedeCerrar(myHand);
    
    closeBtn.disabled = !puedeCerrarAhora;
    if (puedeCerrarAhora) {
        closeBtn.style.background = "#4caf50"; // Verde
        closeBtn.style.color = "white";
        closeBtn.style.animation = "pulse 1s infinite";
    } else {
        closeBtn.style.background = "#ccc"; // Gris
        closeBtn.style.color = "#666";
        closeBtn.style.animation = "none";
    }
}

    
function robarMazo() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || deck.length === 0) return;
    playSfx('carta');
    let carta = deck.pop();
    myHand.push(carta);
    hasDrawn = true;
    
    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano cada vez que robás
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/deck`] = deck;
    actualizaciones[`gameState/hasDrawn`] = true;
    
    gameRef.update(actualizaciones);
}

function robarDescarte() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || discardPile.length === 0) return;
    playSfx('carta');
    let carta = discardPile.pop();
    myHand.push(carta);
    hasDrawn = true;
    addLog("Robaste del descarte");

    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano cada vez que robás del descarte
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/hasDrawn`] = true;
    
    gameRef.update(actualizaciones);
}
function obtenerSiguienteVivo(actualId) {
    let idx = players.findIndex(p => p.id === actualId);
    let total = players.length;
    
    // Traemos el límite real de la configuración
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) 
                 ? ultimoEstadoGalactico.config.maxPts 
                 : 100;

    for (let i = 1; i <= total; i++) {
        let siguiente = players[(idx + i) % total];
        
        // El turno solo pasa si el jugador tiene menos puntos que el límite (50, 100 o 200)
        if ((siguiente.points || 0) < limite) {
            return siguiente.id;
        }
    }
    return actualId; 
}

function descartar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn || selectedCard === null) return;
    playSfx('carta');
    
    let nombreYo = myName || (isHost ? "Anfitrión" : "Jugador"); 
    let carta = myHand.splice(selectedCard, 1)[0];
    discardPile.push(carta);
    
    let next = obtenerSiguienteVivo(myId);

    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano actualizada (con una carta menos)
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/currentTurn`] = next;
    actualizaciones[`gameState/hasDrawn`] = false;
    
    selectedCard = null;
    hasDrawn = false;
    addLog(`${nombreYo} descartó`);
    
    gameRef.update(actualizaciones);
}


function abandonarPartida() {
    if (confirm("¿Estás seguro de que querés salir?")) {
        // Si soy el Host, borro la partida de Firebase para que no quede basura
        if (isHost && gameRef) {
            gameRef.remove(); 
        }
        
        localStorage.removeItem("chinchon_roomId");
        localStorage.removeItem("esAnfitrion");
        window.location.reload();
    }
}


// 1. Primero definí esta función de apoyo (fuera de cerrar)
function calcularMejorPuntaje(mano) {
    let min = 999;
    for (let i = 0; i < mano.length; i++) {
        let t = [...mano]; 
        t.splice(i, 1);
        let p = puntosSueltas(t);
        if (p < min) min = p;
    }
    return min;
}

// 2. Ahora la función cerrar corregida
function cerrar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn) return;
    
    if(puedeCerrar(myHand)) {
        addLog("✨ ¡Cerraste la ronda! ✨");
        
        let nuevosPuntos = {};
        let miPuntajeRonda = calcularMejorPuntaje(myHand);
        
        // El Host o quien cierra calcula los puntos de todos basándose en Firebase
        players.forEach(p => {
            let ptsActuales = p.points || 0;
            let ptsRonda = 0;

            if (p.id === myId) {
                ptsRonda = miPuntajeRonda; 
            } else {
                // Buscamos la mano que el oponente tiene guardada en el servidor
                let suMano = [];
                if (ultimoEstadoGalactico && ultimoEstadoGalactico.hands && ultimoEstadoGalactico.hands[p.id]) {
                    suMano = Array.isArray(ultimoEstadoGalactico.hands[p.id]) 
                             ? ultimoEstadoGalactico.hands[p.id] 
                             : Object.values(ultimoEstadoGalactico.hands[p.id]);
                }
                ptsRonda = puntosSueltas(suMano); 
            }
            
            nuevosPuntos[p.id] = ptsActuales + ptsRonda;
        });

        let actualizaciones = {};
        actualizaciones[`gameState/hands/${myId}`] = myHand;
        actualizaciones[`gameState/rondaEnCurso`] = false;
        actualizaciones[`gameState/winner`] = myId;
        actualizaciones[`gameState/points`] = nuevosPuntos;
        players.forEach((p, index) => {
            actualizaciones[`players/${index}/points`] = nuevosPuntos[p.id];
        }); 
        gameRef.update(actualizaciones);
    } else {
        addLog("❌ No puedes cerrar");
    }
}




// --- ASIGNACIÓN DE EVENTOS SEGURA (USÁ SOLO ESTA) ---
const btnAbandonar = document.getElementById("abandonBtn");
if (btnAbandonar) btnAbandonar.onclick = abandonarPartida;

const btnSalir = document.getElementById("quitGameBtn");
if (btnSalir) btnSalir.onclick = abandonarPartida;

const btnCerrar = document.getElementById("closeBtn");
if (btnCerrar) btnCerrar.onclick = cerrar;


// ========== SALAS ==========
document.getElementById("createBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        roomId = generarCodigo();
        isHost = true;
        localStorage.setItem("esAnfitrion", "true"); // Guardamos que es el jefe
        players = [{ id: myId, name: myName, points: 0 }];
        codeDisplay.innerText = roomId;
        actualizarSala();
        
        gameRef = db.ref("games/" + roomId);
        gameRef.set({ hostId: myId, players: players, status: "waiting", createdAt: Date.now() });
        gameRef.onDisconnect().remove(); 
        gameRef.on("value", (snap) => {
            let data = snap.val();
            if(data) {
                players = data.players || [];
                actualizarSala();
                if(data.status === "playing" && data.gameState) iniciarJuego(data.gameState);
            }
        });
        
        mostrarLobby(true);
        localStorage.setItem("chinchon_roomId", roomId);
    };
    
    document.getElementById("joinBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        let code = document.getElementById("roomCode").value.trim();
        if(code.length !== 6) { alert("Código de 6 dígitos"); return; }
        roomId = code;
        isHost = false;
        
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            let data = snap.val();
            if(!data) { alert("Sala no encontrada"); return; }
    
    // Verificamos si ya éramos parte de esta partida
    let yaEstabaEnLaPartida = data.players && data.players.some(p => p.id === myId);

    // Si la partida comenzó y NO somos uno de los jugadores, entonces bloqueamos
    if(data.status === "playing" && !yaEstabaEnLaPartida) { 
        alert("Partida ya comenzó y no eres parte de ella."); 
        return; 
    }
    
    // Si no estábamos, nos agregamos (solo si la partida no empezó)
    if(!yaEstabaEnLaPartida) {
        let newPlayers = [...(data.players || []), { id: myId, name: myName, points: 0 }];
        gameRef.update({ players: newPlayers });
    }
    
    // El resto del código (.on("value") y mostrarLobby) sigue igual...
    gameRef.on("value", (snap) => {
        let newData = snap.val();
        if(newData) {
            players = newData.players || [];
            actualizarSala();
            if(newData.status === "playing" && newData.gameState) iniciarJuego(newData.gameState);
        }
    });
    mostrarLobby(false);
    localStorage.setItem("chinchon_roomId", roomId);
});

    };
    
function actualizarSala() {
    // 1. Mantener el código de sala visible
    if (roomId) {
        document.getElementById("codeDisplay").innerText = roomId;
    }

    // 2. Definir el límite de puntos (usamos el del Host o 100 por defecto)
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) ? ultimoEstadoGalactico.config.maxPts : 100;
    
    // 3. Verificamos si alguien ya perdió (llegó o pasó el límite)
    let hayPerdedor = players.some(p => (p.points || 0) >= limite);

    // 4. Dibujar la lista con calaveras si alguien perdió
    playersList.innerHTML = players.map(p => {
        let pts = p.points || 0;
        let perdio = pts >= limite;
        return `<li>${perdio ? "💀" : "👤"} ${p.name} ${p.id === myId ? "(tú)" : ""}: <b>${pts} pts</b></li>`;
    }).join("");

    // 5. Lógica de botones para el Host
    if(isHost) {
        const resetBtn = document.getElementById("resetTournamentBtn");

        if (hayPerdedor) {
            // Si alguien perdió, bloqueamos el de Empezar y mostramos el de Reiniciar
            startGameBtn.disabled = true;
            startGameBtn.style.opacity = "0.5";
            startGameBtn.innerText = "🏁 Partida Finalizada";
            
            if (resetBtn) resetBtn.classList.remove("hidden");
            
            lobbyStatus.innerHTML = "🏆 Alguien llegó al límite. ¡Reiniciá para jugar otra vez!";
            lobbyStatus.className = "status status-wait";
        } else {
            // Si nadie perdió todavía, flujo normal
            if (resetBtn) resetBtn.classList.add("hidden");
            startGameBtn.innerText = "🎮 Empezar Ronda";
            
            if (players.length >= 2) {
                startGameBtn.disabled = false;
                startGameBtn.style.opacity = "1";
                lobbyStatus.innerHTML = "✅ ¡Listo para la siguiente ronda!";
                lobbyStatus.className = "status status-ok";
            } else {
                startGameBtn.disabled = true;
                startGameBtn.style.opacity = "0.5";
                lobbyStatus.innerHTML = "⏳ Esperando jugadores...";
                lobbyStatus.className = "status status-wait";
            }
        }
    }
}

    
    function mostrarLobby(host) {
        startScreen.classList.add("hidden");
        lobbyScreen.classList.remove("hidden");
        gameScreen.classList.add("hidden");
        if(!host) {
            startGameBtn.classList.add("hidden");
            lobbyStatus.innerHTML = "Conectado. Esperando al anfitrión...";
        } else {
            startGameBtn.classList.remove("hidden");
        }
        document.getElementById("hostConfig").classList.toggle("hidden", !host);
    }
    
startGameBtn.onclick = () => {
    if(isHost && players.length >= 2) {
        // 1. Capturamos configuración
        const maxPts = parseInt(document.getElementById("maxPtsInput").value) || 100;
        const cantComodines = parseInt(document.getElementById("comodinesInput").value) || 0;
        const limiteCierre = parseInt(document.getElementById("cierreInput").value) || 5;

        // 2. Creamos baraja
        let baraja = [];
        for(let p of PALOS) {
            for(let n=1; n<=12; n++) baraja.push({ palo: p, numero: n, comodin: false });
        }
        for(let i=0; i<cantComodines; i++) baraja.push({ palo: "comodin", numero: 0, comodin: true });
        
        let mazo = mezclar(baraja);
        let desc = [mazo.pop()];
        let manos = {};
        let puntosPersistentes = {};

        // 3. Repartir y mantener puntos reales
        players.forEach(p => {
            // Buscamos los puntos que ya están en el objeto players
            puntosPersistentes[p.id] = p.points || 0;
            
            let mano = [];
            for(let i=0; i<7; i++) mano.push(mazo.pop());
            manos[p.id] = mano;
        });

        let estado = {
            deck: mazo,
            discardPile: desc,
            hands: manos,
            currentTurn: players[0].id, // Corregido: primer jugador de la lista
            points: puntosPersistentes,
            rondaEnCurso: true,
            hasDrawn: false,
            config: { maxPts, limiteCierre } 
        };
        
        gameRef.update({ status: "playing", gameState: estado });
        // No llamamos a iniciarJuego(estado) aquí, dejamos que el listener lo haga para todos
    }
};

const btnReset = document.getElementById("resetTournamentBtn");
if (btnReset) {
    btnReset.onclick = () => {
        if (confirm("¿Reiniciar todos los puntos a 0 para empezar un nuevo torneo?")) {
            let actualizaciones = {};
            players.forEach((p, index) => {
                actualizaciones[`players/${index}/points`] = 0;
            });
            actualizaciones["gameState"] = null;
            gameRef.update(actualizaciones);
        }
    };
}

    
function iniciarJuego(estado) {
    // 1. Carga inicial de variables
    myHand = (estado.hands && estado.hands[myId]) ? estado.hands[myId] : [];
    deck = estado.deck || [];
    discardPile = estado.discardPile || [];
    currentTurn = estado.currentTurn;
    myPoints = (estado.points && estado.points[myId]) ? estado.points[myId] : 0;
    
    rondaEnCurso = estado.rondaEnCurso;
    hasDrawn = estado.hasDrawn || false;
    gameActive = true;
    selectedCard = null;
    
    otherPlayers = players.filter(p => p.id !== myId).map(p => ({
        id: p.id, name: p.name, points: (estado.points && estado.points[p.id]) || 0
    }));
    
    startScreen.classList.add("hidden");
    lobbyScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    actualizarJuego();
    
    // 2. Listener en tiempo real
    gameRef.child("gameState").on("value", (snap) => {
        let nuevo = snap.val();
        if(nuevo) {
            ultimoEstadoGalactico = nuevo; 

            if (nuevo.currentTurn === myId && currentTurn !== myId) {
                playSfx('turno');
            }

            let anteriorRonda = rondaEnCurso; 
            deck = nuevo.deck || [];
            discardPile = nuevo.discardPile || [];
            rondaEnCurso = nuevo.rondaEnCurso;
            currentTurn = nuevo.currentTurn;
            hasDrawn = nuevo.hasDrawn || false;

            if(nuevo.hands && nuevo.hands[myId]) {
                myHand = Array.isArray(nuevo.hands[myId]) ? nuevo.hands[myId] : Object.values(nuevo.hands[myId]);
            }

            if(nuevo.points) {
                myPoints = nuevo.points[myId] || 0;
                otherPlayers.forEach(op => {
                    if(nuevo.points[op.id] !== undefined) op.points = nuevo.points[op.id];
                });
            }

            // 3. DETECTAR CIERRE DE RONDA, PUNTOS Y GANADOR FINAL
            if(nuevo.winner && anteriorRonda === true && rondaEnCurso === false) {
                if(nuevo.winner === myId) playSfx('ganar');
                else playSfx('perder');
                
                let limite = (nuevo.config && nuevo.config.maxPts) ? nuevo.config.maxPts : 100;
                let alguienPerdioDefinitivamente = false;
                let resumen = "📊 RESULTADOS DE LA RONDA:\n\n";
                
                players.forEach(p => {
                    let manoJugador = nuevo.hands ? (nuevo.hands[p.id] || []) : [];
                    let ptsGanados = (p.id === nuevo.winner) ? calcularMejorPuntaje(manoJugador) : puntosSueltas(manoJugador);
                    
                    // Actualizamos los puntos localmente para la lista del lobby
                    p.points = nuevo.points[p.id]; 
                    resumen += `${p.name}: +${ptsGanados} pts (Total: ${p.points})\n`;
                    
                    if (p.points >= limite) alguienPerdioDefinitivamente = true;
                });
                
                alert(resumen); 

                // Si alguien perdió, anunciamos al campeón absoluto
                if (alguienPerdioDefinitivamente) {
                    let ganadorFinal = players.reduce((prev, curr) => (prev.points < curr.points) ? prev : curr);
                    alert(`🏆 ¡PARTIDA TERMINADA! 🏆\nEl campeón es ${ganadorFinal.name} con ${ganadorFinal.points} puntos.`);
                    if(isHost) gameRef.update({ status: "finished" });
                }

                setTimeout(() => { 
                    if(isHost) {
                        gameRef.child("gameState").update({ winner: null, rondaEnCurso: false });
                    }
                    
                    gameScreen.classList.add("hidden");
                    lobbyScreen.classList.remove("hidden");
                    
                    // Sincronizamos la lista de jugadores con los puntos grabados en Firebase
                    gameRef.once("value", (snap) => {
                        let d = snap.val();
                        if(d && d.players) {
                            players = d.players;
                        }
                        actualizarSala(); 
                    });
                }, 1000);
            }

            actualizarJuego();
        }
    });
}

    document.getElementById("mazoBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarMazo();
            else if(hasDrawn && selectedCard !== null) cerrar();
        }
    };
    document.getElementById("descarteBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarDescarte();
            else if(hasDrawn && selectedCard !== null) descartar();
        }
    };
    closeBtn.onclick = cerrar;
    
    // Cargar imagen
    const img = new Image();
    img.onload = () => { SPRITE_URL = IMAGE_FILE; statusMsg.innerHTML = "✅ Listo!"; };
    img.onerror = () => { statusMsg.innerHTML = "⚠️ Imagen no encontrada"; };
    img.src = IMAGE_FILE;
window.addEventListener('load', () => {
    if (myName) document.getElementById("playerNameInput").value = myName;

    let lastRoom = localStorage.getItem("chinchon_roomId");
    if (lastRoom) {
        roomId = lastRoom;
        isHost = localStorage.getItem("esAnfitrion") === "true";
        
        // Conectamos a la sala automáticamente
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            if(snap.exists()) {
                // Si la partida ya empezó, el listener de abajo nos meterá al juego
                gameRef.on("value", (snap) => {
                    let data = snap.val();
                    if(data) {
                        players = data.players || [];
                        if(data.status === "playing" && data.gameState) iniciarJuego(data.gameState);
                        else mostrarLobby(isHost);
                    }
                });
            }
        });
    }
});
