<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chinchón Online - Firebase</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .screen {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
        }
        h1 { color: #2c5a2a; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
        }
        button { background: #f3b33d; cursor: pointer; box-shadow: 0 3px 0 #7a4c1a; }
        button:active { transform: translateY(2px); }
        .btn-green { background: #2e7d32; color: white; }
        .code-box {
            background: #2c1a10;
            color: #ffd966;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 15px 0;
        }
        .players-list {
            list-style: none;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .players-list li {
            background: #e0e0e0;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
        }
        .hidden { display: none; }
        .status {
            padding: 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .status-ok { background: #c8e6c9; color: #2e7d32; }
        .status-wait { background: #fff3e0; color: #e65100; }
        
        /* Juego */
        .players-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; }
        .player-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            min-width: 90px;
            text-align: center;
        }
        .player-card.active { background: rgba(255,215,0,0.4); border: 2px solid gold; }
        .center-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
        }

        .my-hand {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .card-pile {
            width: 80px; 
            height: 123px; /* Proporción corregida */
            background: #2c1a10;
            border-radius: 10px;
            border: 2px solid #ffd966;
            cursor: pointer;
        }

        .carta {
            width: 80px; 
            height: 123px; /* Proporción corregida */
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px black;
        }
        .carta.selected { transform: translateY(-12px); filter: drop-shadow(0 0 8px gold); }
        .game-buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        button { width: auto; padding: 10px 18px; }
.log {
    background: rgba(0,0,0,0.5);
    color: #f7eac5;
    border-radius: 15px;
    padding: 10px;
    font-size: 0.8rem;
    margin-top: 10px;
    max-height: 100px;
    overflow-y: auto;
}
.turno {
    /* Ya no es fixed al fondo */
    position: relative; 
    margin: 10px auto;
    width: fit-content;
    padding: 8px 25px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 10;
}
        .turno.mio { background: #4caf50; color: white; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
            100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
        }
        @media (max-width: 500px) {
            .carta { width: 62px; height: 95px; }
            .card-pile { width: 70px; height: 107px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Pantalla inicio -->
    <div id="startScreen" class="screen">
        <input type="text" id="playerNameInput" placeholder="Tu Nombre" maxlength="12" style="text-align: center; margin-bottom: 10px;">
        <h1>🎴 Chinchón Online</h1>
        <button class="btn-green" id="createBtn">🏠 Crear Partida</button>
        <div style="margin: 10px 0;">o</div>
        <input type="text" id="roomCode" placeholder="Código" maxlength="6">
        <button id="joinBtn">🔗 Unirse</button>
        <div class="status status-wait" id="statusMsg">Conectando a Firebase...</div>
    </div>

    <!-- Pantalla sala (Lobby) -->
    <div id="lobbyScreen" class="screen hidden">
        <h1>Sala</h1>
        <div class="code-box" id="codeDisplay">----</div>
        <ul class="players-list" id="playersList"></ul>
        <button class="btn-green" id="startGameBtn">🎮 Empezar</button>
        <button id="abandonBtn" style="background: #f44336; color: white; width: 100%;">🚪 Abandonar Sala</button>
        <div class="status status-wait" id="lobbyStatus">Esperando jugadores...</div>
    </div>

    <!-- Pantalla juego -->
    <div id="gameScreen" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="turno" id="turnText" style="position: static; margin: 0;">Conectando...</div>
            <button id="quitGameBtn" style="background: #f44336; color: white; padding: 8px 15px; font-size: 0.8rem; border-radius: 20px; border: none; font-weight: bold;">Salir</button>
        </div>
        
        <div class="players-row" id="playersRow"></div>
        
        <div class="center-area">
            <div class="pile" id="mazoBtn">
                <div class="card-pile" id="deckPile"></div>
                <div id="deckCount" style="color:white; text-align: center;">0</div>
            </div>
            <div class="pile" id="descarteBtn">
                <div class="card-pile" id="discardPile"></div>
            </div>
        </div>
        
        <div class="my-hand" id="myHand"></div>
        
        <div class="game-buttons">
            <button id="closeBtn">✂️ Cerrar</button>
        </div>
        <div class="log" id="log"></div>
    </div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ============================================================
    // 🔥 PONÉ ACÁ TU CONFIGURACIÓN DE FIREBASE 🔥
    // ============================================================
    const firebaseConfig = {
  apiKey: "AIzaSyBq3DeZQz9-4gpOe2YyVPLRRAv8jsGcldk",
  authDomain: "juegoscartas-eac64.firebaseapp.com",
  databaseURL: "https://juegoscartas-eac64-default-rtdb.firebaseio.com",
  projectId: "juegoscartas-eac64",

  messagingSenderId: "671826149545",
  appId: "1:671826149545:web:f9f706575f4d3df3b229b8"
};
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
// --- AUDIO ---
const sfx = {
    turno: new Audio('sounds/turno.mp3'),
    ganar: new Audio('sounds/ganar.mp3'),
    perder: new Audio('sounds/perder.mp3'),
    carta: new Audio('sounds/carta.mp3')
};

function playSfx(nombre) {
    sfx[nombre].currentTime = 0;
    sfx[nombre].play().catch(() => {}); // El catch evita errores si el navegador bloquea el audio
}

    // ============================================================
    // 🃏 IMAGEN DE LA BARAJA
    // ============================================================
    const IMAGE_FILE = "Baraja_española_completa.png";
const CARD_W = 208, CARD_H = 319; 
const SPRITE_W = 2496, SPRITE_H = 1595;
    const PALO_FILA = { "oros": 0, "copas": 1, "espadas": 2, "bastos": 3 };
    let SPRITE_URL = null;
    
function cardBG(carta) {
    if (!SPRITE_URL) return "background: #4a3727;";
    let fila, col;
    if (carta.comodin) { 
        fila = 4; col = 0; 
    } else { 
        fila = PALO_FILA[carta.palo]; 
        col = carta.numero - 1; 
    }
    
    // La imagen tiene 12 columnas (0 a 11) y 5 filas (0 a 4)
    // Usamos porcentajes exactos para que el navegador recorte bien en cualquier zoom
    const xPercent = (col * 100) / 11; 
    const yPercent = (fila * 100) / 4;  
    
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}



function dorso() {
    if (!SPRITE_URL) return "background: #4a3727;";
    // El dorso está en la fila 5, columna 2 (índice 4, 1)
    const xPercent = (1 * 100) / 11;
    const yPercent = (4 * 100) / 4;
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}


    // ============================================================
    // 🎮 LÓGICA DEL JUEGO
    // ============================================================
    const PALOS = ["oros", "copas", "espadas", "bastos"];
    
    function crearBaraja() {
        let b = [];
        for(let p of PALOS) for(let n=1; n<=12; n++) b.push({ palo: p, numero: n, comodin: false });
        b.push({ palo: "comodin", numero: 0, comodin: true });
        return b;
    }
    
    function mezclar(a) { for(let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function valorCarta(c) { if(c.comodin) return 0; if(c.numero >= 10) return 10; return c.numero; }
    
    function puntosSueltas(mano) {
        if(mano.length === 0) return 0;
        let usado = new Array(mano.length).fill(false);
        let comodines = mano.map((c,i)=>c.comodin?i:-1).filter(i=>i!==-1);
        let normales = mano.map((c,i)=>c.comodin?null:{idx:i,palo:c.palo,num:c.numero}).filter(c=>c);
        let usadosComodin = 0;
        
        function buscarGrupo() {
            for(let i=0; i<normales.length; i++) {
                if(usado[normales[i].idx]) continue;
                let grupo = [normales[i].idx];
                for(let j=i+1; j<normales.length; j++) {
                    if(!usado[normales[j].idx] && normales[j].num === normales[i].num && mano[normales[j].idx].palo !== mano[normales[i].idx].palo) {
                        if(grupo.length < 4 && !grupo.some(idx=>mano[idx].palo===mano[normales[j].idx].palo)) grupo.push(normales[j].idx);
                    }
                }
                if(grupo.length >= 3) { grupo.forEach(idx=>usado[idx]=true); return true; }
                if(grupo.length === 2 && usadosComodin < comodines.length) { grupo.forEach(idx=>usado[idx]=true); usado[comodines[usadosComodin++]] = true; return true; }
            }
            return false;
        }
        
        function buscarEscalera() {
            for(let palo of PALOS) {
                let cartasPalo = [];
                for(let idx=0; idx<normales.length; idx++) if(!usado[normales[idx].idx] && mano[normales[idx].idx].palo === palo) cartasPalo.push({idx:normales[idx].idx, num:normales[idx].num});
                cartasPalo.sort((a,b)=>a.num-b.num);
                let temp = [], mejor = [];
                for(let i=0; i<cartasPalo.length; i++) {
                    if(temp.length===0 || cartasPalo[i].num === temp[temp.length-1].num+1) temp.push(cartasPalo[i]);
                    else { if(temp.length>=3) mejor.push(...temp); temp = [cartasPalo[i]]; }
                }
                if(temp.length>=3) mejor.push(...temp);
                if(mejor.length>=3) { for(let item of mejor) usado[item.idx]=true; return true; }
                if(mejor.length === 2 && usadosComodin < comodines.length) { for(let item of mejor) usado[item.idx]=true; usado[comodines[usadosComodin++]] = true; return true; }
            }
            return false;
        }
        
        let cambio = true;
        while(cambio) { cambio = buscarGrupo() || buscarEscalera(); }
        let pts = 0;
        for(let i=0; i<mano.length; i++) if(!usado[i]) pts += valorCarta(mano[i]);
        return pts;
    }
    
    function puedeCerrar(mano) {
        if(mano.length === 0) return true;
        let usado = new Array(mano.length).fill(false);
        let comodines = mano.map((c,i)=>c.comodin?i:-1).filter(i=>i!==-1);
        let normales = mano.map((c,i)=>c.comodin?null:{idx:i,palo:c.palo,num:c.numero}).filter(c=>c);
        let usadosComodin = 0;
        
        function buscarGrupo() {
            for(let i=0; i<normales.length; i++) {
                if(usado[normales[i].idx]) continue;
                let grupo = [normales[i].idx];
                for(let j=i+1; j<normales.length; j++) {
                    if(!usado[normales[j].idx] && normales[j].num === normales[i].num && mano[normales[j].idx].palo !== mano[normales[i].idx].palo) {
                        if(grupo.length < 4 && !grupo.some(idx=>mano[idx].palo===mano[normales[j].idx].palo)) grupo.push(normales[j].idx);
                    }
                }
                if(grupo.length >= 3) { grupo.forEach(idx=>usado[idx]=true); return true; }
                if(grupo.length === 2 && usadosComodin < comodines.length) { grupo.forEach(idx=>usado[idx]=true); usado[comodines[usadosComodin++]] = true; return true; }
            }
            return false;
        }
        
        function buscarEscalera() {
            for(let palo of PALOS) {
                let cartasPalo = [];
                for(let idx=0; idx<normales.length; idx++) if(!usado[normales[idx].idx] && mano[normales[idx].idx].palo === palo) cartasPalo.push({idx:normales[idx].idx, num:normales[idx].num});
                cartasPalo.sort((a,b)=>a.num-b.num);
                let temp = [], mejor = [];
                for(let i=0; i<cartasPalo.length; i++) {
                    if(temp.length===0 || cartasPalo[i].num === temp[temp.length-1].num+1) temp.push(cartasPalo[i]);
                    else { if(temp.length>=3) mejor.push(...temp); temp = [cartasPalo[i]]; }
                }
                if(temp.length>=3) mejor.push(...temp);
                if(mejor.length>=3) { for(let item of mejor) usado[item.idx]=true; return true; }
                if(mejor.length === 2 && usadosComodin < comodines.length) { for(let item of mejor) usado[item.idx]=true; usado[comodines[usadosComodin++]] = true; return true; }
            }
            return false;
        }
        
        let cambio = true;
        while(cambio) { cambio = buscarGrupo() || buscarEscalera(); }
        let sueltas = 0, idxSuelta = -1;
        for(let i=0; i<mano.length; i++) if(!usado[i]) { sueltas++; idxSuelta = i; }
        if(sueltas === 0) return true;
        if(sueltas === 1 && valorCarta(mano[idxSuelta]) <= 4) return true;
        return false;
    }

    // ============================================================
    // 🔥 MULTIJUGADOR Y PERSISTENCIA
    // ============================================================
    
    // Recuperamos o generamos el ID único del dispositivo
    let myId = localStorage.getItem("chinchon_myId");
    if (!myId) {
        myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("chinchon_myId", myId);
    }

    // Recuperamos el nombre si ya lo usó antes
    let myName = localStorage.getItem("chinchon_myName") || "";

    let roomId = null, isHost = false;
    let players = [], gameRef = null;
    let myHand = [], deck = [], discardPile = [], currentTurn = null;
    let gameActive = false, rondaEnCurso = false, hasDrawn = false, selectedCard = null;
    let myPoints = 0, otherPlayers = [];

    // DOM
    const startScreen = document.getElementById("startScreen");
    const lobbyScreen = document.getElementById("lobbyScreen");
    const gameScreen = document.getElementById("gameScreen");
    const statusMsg = document.getElementById("statusMsg");
    const codeDisplay = document.getElementById("codeDisplay");
    const playersList = document.getElementById("playersList");
    const lobbyStatus = document.getElementById("lobbyStatus");
    const startGameBtn = document.getElementById("startGameBtn");
    const playersRow = document.getElementById("playersRow");
    const deckPile = document.getElementById("deckPile");
    const deckCount = document.getElementById("deckCount");
    const discardPileDiv = document.getElementById("discardPile");
    const myHandDiv = document.getElementById("myHand");
    const logDiv = document.getElementById("log");
    const turnText = document.getElementById("turnText");
    const closeBtn = document.getElementById("closeBtn");
    
    function addLog(msg) { 
    logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML; 
    if(logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild); 
}
    
    function generarCodigo() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generarId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    // UI del juego
    function actualizarJuego() {
    // 1. Inicialización de seguridad
    if (!deck) deck = [];
    if (!myHand) myHand = [];
    if (!discardPile) discardPile = [];
    if (!otherPlayers) otherPlayers = [];

    // 2. Dibujar Oponentes
    playersRow.innerHTML = "";
    for(let p of otherPlayers) {
        const div = document.createElement("div");
        div.className = `player-card ${currentTurn === p.id ? "active" : ""}`;
        div.innerHTML = `<div class="player-name">${p.name}</div><div class="player-points">${p.points || 0} pts</div>`;
        playersRow.appendChild(div);
    }
    
    // 3. Mazo y Descarte
    deckPile.style.cssText = dorso();
    deckCount.innerText = deck.length;
    
    if(discardPile.length > 0) {
        discardPileDiv.style.cssText = cardBG(discardPile[discardPile.length-1]);
    } else {
        discardPileDiv.style.cssText = "background: #4a3727;";
    }
    
    // 4. Mi mano
    myHandDiv.innerHTML = "";
    myHand.forEach((c, i) => {
        const div = document.createElement("div");
        div.className = `carta ${selectedCard === i ? "selected" : ""}`;
        div.style.cssText = cardBG(c);
        // Solo podés seleccionar carta si es tu turno y YA ROBASTE
        if(gameActive && rondaEnCurso && currentTurn === myId && hasDrawn) {
            div.onclick = () => { selectedCard = selectedCard === i ? null : i; actualizarJuego(); };
        }
        myHandDiv.appendChild(div);
    });
    
    // 5. Lógica del Turno (Texto)
    if(currentTurn === myId && gameActive && rondaEnCurso) {
        turnText.innerHTML = "🎯 TU TURNO";
        turnText.className = "turno mio";
    } else if(gameActive && rondaEnCurso) {
        let nom = otherPlayers.find(p=>p.id===currentTurn)?.name || "otro";
        turnText.innerHTML = `⏳ Turno de ${nom}`;
        turnText.className = "turno";
    }
    
    // 6. Lógica del Botón CERRAR (¡Corregida!)
    const puedeCerrarAhora = gameActive && rondaEnCurso && currentTurn === myId && hasDrawn && puedeCerrar(myHand);
    
    closeBtn.disabled = !puedeCerrarAhora;
    if (puedeCerrarAhora) {
        closeBtn.style.background = "#4caf50"; // Verde
        closeBtn.style.color = "white";
        closeBtn.style.animation = "pulse 1s infinite";
    } else {
        closeBtn.style.background = "#ccc"; // Gris
        closeBtn.style.color = "#666";
        closeBtn.style.animation = "none";
    }
}

    
function robarMazo() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || deck.length === 0) return;
    playSfx('carta');
    let carta = deck.pop();
    myHand.push(carta);
    hasDrawn = true;
    
    let actualizaciones = {};
    // Quitamos "gameState/" de la llave porque ya vamos a actualizar sobre el nodo de la partida
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/deck`] = deck;
    actualizaciones[`gameState/hasDrawn`] = true;
    
    gameRef.update(actualizaciones);
    // No hace falta llamar a actualizarJuego() acá porque el listener .on("value") lo hará por vos
}
function robarDescarte() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || discardPile.length === 0) return;
    
    let carta = discardPile.pop();
    myHand.push(carta);
    hasDrawn = true;
    addLog("Robaste del descarte");

    let actualizaciones = {};
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/hasDrawn`] = true;
    
    gameRef.update(actualizaciones);
}
function descartar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn || selectedCard === null) return;
    playSfx('carta');
    let nombreYo = isHost ? "Anfitrión" : "Jugador"; // O usá el nombre real si lo tenés
    addLog(`🎴 ${nombreYo} descartó`); // Esto lo ves vos
    let carta = myHand.splice(selectedCard, 1)[0];
    discardPile.push(carta);
    
    // IMPORTANTE: Asegurate que 'players' sea la lista completa que viene de la sala
    let idx = players.findIndex(p => p.id === myId);
    let next = players[(idx + 1) % players.length].id;

    let actualizaciones = {};
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/currentTurn`] = next;
    actualizaciones[`gameState/hasDrawn`] = false;
    
    selectedCard = null;
    hasDrawn = false;
    addLog("Descartaste");
    
    gameRef.update(actualizaciones);
}
function abandonarPartida() {
    if (confirm("¿Estás seguro de que querés salir de la partida?")) {
        localStorage.removeItem("chinchon_roomId");
        localStorage.removeItem("esAnfitrion");
        window.location.reload();
    }
}

function cerrar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn) return;
    
    if(puedeCerrar(myHand)) {
        addLog("✨ ¡Cerraste la ronda! ✨");
        let actualizaciones = {};
        actualizaciones[`gameState/hands/${myId}`] = myHand;
        actualizaciones[`gameState/rondaEnCurso`] = false;
        actualizaciones[`gameState/winner`] = myId;
        gameRef.update(actualizaciones);
    } else {
        addLog("❌ No puedes cerrar");
    }
}

// --- ASIGNACIÓN DE EVENTOS ---
// Usamos el operador ?. o un if para evitar errores si el elemento no está en el DOM
document.getElementById("abandonBtn").onclick = abandonarPartida;
const quitBtn = document.getElementById("quitGameBtn");
if (quitBtn) quitBtn.onclick = abandonarPartida;
document.getElementById("closeBtn").onclick = cerrar;

// ========== SALAS ==========
document.getElementById("createBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        roomId = generarCodigo();
        isHost = true;
        localStorage.setItem("esAnfitrion", "true"); // Guardamos que es el jefe
        players = [{ id: myId, name: myName, points: 0 }];
        codeDisplay.innerText = roomId;
        actualizarSala();
        
        gameRef = db.ref("games/" + roomId);
        gameRef.set({ hostId: myId, players: players, status: "waiting", createdAt: Date.now() });
        
        gameRef.on("value", (snap) => {
            let data = snap.val();
            if(data) {
                players = data.players || [];
                actualizarSala();
                if(data.status === "playing" && data.gameState) iniciarJuego(data.gameState);
            }
        });
        
        mostrarLobby(true);
        localStorage.setItem("chinchon_roomId", roomId);
    };
    
    document.getElementById("joinBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        let code = document.getElementById("roomCode").value.trim();
        if(code.length !== 6) { alert("Código de 6 dígitos"); return; }
        roomId = code;
        isHost = false;
        
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            let data = snap.val();
            if(!data) { alert("Sala no encontrada"); return; }
    
    // Verificamos si ya éramos parte de esta partida
    let yaEstabaEnLaPartida = data.players && data.players.some(p => p.id === myId);

    // Si la partida comenzó y NO somos uno de los jugadores, entonces bloqueamos
    if(data.status === "playing" && !yaEstabaEnLaPartida) { 
        alert("Partida ya comenzó y no eres parte de ella."); 
        return; 
    }
    
    // Si no estábamos, nos agregamos (solo si la partida no empezó)
    if(!yaEstabaEnLaPartida) {
        let newPlayers = [...(data.players || []), { id: myId, name: myName, points: 0 }];
        gameRef.update({ players: newPlayers });
    }
    
    // El resto del código (.on("value") y mostrarLobby) sigue igual...
    gameRef.on("value", (snap) => {
        let newData = snap.val();
        if(newData) {
            players = newData.players || [];
            actualizarSala();
            if(newData.status === "playing" && newData.gameState) iniciarJuego(newData.gameState);
        }
    });
    mostrarLobby(false);
    localStorage.setItem("chinchon_roomId", roomId);
});

    };
    
    function actualizarSala() {
        playersList.innerHTML = players.map(p => `<li>${p.name} ${p.id === myId ? "(tú)" : ""}</li>`).join("");
        if(isHost && players.length >= 2) {
            startGameBtn.disabled = false;
            startGameBtn.style.opacity = "1";
            lobbyStatus.innerHTML = "✅ Listo! Empezar";
            lobbyStatus.className = "status status-ok";
        } else if(isHost) {
            startGameBtn.disabled = true;
            startGameBtn.style.opacity = "0.5";
            lobbyStatus.innerHTML = "⏳ Esperando jugadores (mínimo 2)";
            lobbyStatus.className = "status status-wait";
        }
    }
    
    function mostrarLobby(host) {
        startScreen.classList.add("hidden");
        lobbyScreen.classList.remove("hidden");
        gameScreen.classList.add("hidden");
        if(!host) {
            startGameBtn.classList.add("hidden");
            lobbyStatus.innerHTML = "Conectado. Esperando al anfitrión...";
        } else {
            startGameBtn.classList.remove("hidden");
        }
    }
    
    startGameBtn.onclick = () => {
        if(isHost && players.length >= 2) {
            let baraja = mezclar(crearBaraja());
            let mazo = [...baraja];
            let desc = [mazo.pop()];
            let manos = {};
            players.forEach(p => {
                manos[p.id] = mazo.splice(0, 7); // Repartir 7 a cada uno
            });
            let estado = {
                deck: mazo,
                discardPile: desc,
                hands: manos,
                currentTurn: players[0].id,
                points: Object.fromEntries(players.map(p => [p.id, 0])),
                rondaEnCurso: true,
                hasDrawn: false
            };
            gameRef.update({ status: "playing", gameState: estado });
            iniciarJuego(estado);
        }
    };
    
function iniciarJuego(estado) {
    // Carga inicial
    myHand = (estado.hands && estado.hands[myId]) ? estado.hands[myId] : [];
    deck = estado.deck || [];
    discardPile = estado.discardPile || [];
    currentTurn = estado.currentTurn;
    myPoints = (estado.points && estado.points[myId]) ? estado.points[myId] : 0;
    
    rondaEnCurso = estado.rondaEnCurso;
    hasDrawn = estado.hasDrawn || false;
    gameActive = true;
    selectedCard = null;
    
    // Actualizar oponentes
    otherPlayers = players.filter(p => p.id !== myId).map(p => ({
        id: p.id, name: p.name, points: (estado.points && estado.points[p.id]) || 0
    }));
    
    startScreen.classList.add("hidden");
    lobbyScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    actualizarJuego();
    
    // Listener en tiempo real
    gameRef.child("gameState").on("value", (snap) => {
        let nuevo = snap.val();
        if(nuevo) {
            // 1. Sonido de turno (comparar antes de actualizar currentTurn global)
            if (nuevo.currentTurn === myId && currentTurn !== myId) {
                playSfx('turno');
            }

            // 2. Actualizar variables globales
            deck = nuevo.deck || [];
            discardPile = nuevo.discardPile || [];
            let anteriorRonda = rondaEnCurso; // Para detectar el cierre
            rondaEnCurso = nuevo.rondaEnCurso;
            currentTurn = nuevo.currentTurn;
            hasDrawn = nuevo.hasDrawn || false;

            if(nuevo.hands && nuevo.hands[myId]) {
                myHand = Array.isArray(nuevo.hands[myId]) ? nuevo.hands[myId] : Object.values(nuevo.hands[myId]);
            }

            if(nuevo.points) {
                myPoints = nuevo.points[myId] || 0;
                otherPlayers.forEach(op => {
                    if(nuevo.points[op.id] !== undefined) op.points = nuevo.points[op.id];
                });
            }

            // 3. Lógica de Ganador y Sonidos de fin de ronda
            if(nuevo.winner && anteriorRonda === true && rondaEnCurso === false) {
                if(nuevo.winner === myId) playSfx('ganar');
                else playSfx('perder');
                
                let ganador = players.find(p => p.id === nuevo.winner);
                addLog(`🏆 ${ganador ? ganador.name : "Alguien"} cerró la ronda!`);
                
                setTimeout(() => { 
                    if(isHost) gameRef.update({ gameState: null, status: "waiting" }); 
                }, 3000);
            }

            actualizarJuego();
        }
    });
}

    document.getElementById("backBtn").onclick = () => window.location.reload();
    document.getElementById("mazoBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarMazo();
            else if(hasDrawn && selectedCard !== null) cerrar();
        }
    };
    document.getElementById("descarteBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarDescarte();
            else if(hasDrawn && selectedCard !== null) descartar();
        }
    };
    closeBtn.onclick = cerrar;
    
    // Cargar imagen
    const img = new Image();
    img.onload = () => { SPRITE_URL = IMAGE_FILE; statusMsg.innerHTML = "✅ Listo!"; };
    img.onerror = () => { statusMsg.innerHTML = "⚠️ Imagen no encontrada"; };
    img.src = IMAGE_FILE;
window.addEventListener('load', () => {
    if (myName) document.getElementById("playerNameInput").value = myName;

    let lastRoom = localStorage.getItem("chinchon_roomId");
    if (lastRoom) {
        document.getElementById("roomCode").value = lastRoom;
        // Recuperamos si era host
        isHost = localStorage.getItem("esAnfitrion") === "true";
        
        statusMsg.innerHTML = `⚠️ Partida detectada. Dale a 'Unirse' para volver.`;
    }
});



</script>
