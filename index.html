<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chinchón Online - Firebase</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: system-ui, sans-serif;
            padding: 8px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { 
            width: 100%; 
            max-width: 550px; 
            margin: 0 auto; 
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #gameScreen {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        #gameScreen.hidden {
            display: none !important;
        }
        .screen {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            overflow-y: auto;
        }
        h1 { color: #2c5a2a; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
        }
        button { background: #f3b33d; cursor: pointer; box-shadow: 0 3px 0 #7a4c1a; }
        button:active { transform: translateY(2px); }
        .btn-green { background: #2e7d32; color: white; }
        .code-box {
            background: #2c1a10;
            color: #ffd966;
            padding: 10px;
            border-radius: 20px;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 5px 0;
        }
        .players-list {
            list-style: none;
            margin: 5px 0;
            max-height: 120px;
            overflow-y: auto;
            padding: 0;
        }
        .players-list li {
            background: #e0e0e0;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 30px;
        }
        .hidden { display: none; }
        .status {
            padding: 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .status-ok { background: #c8e6c9; color: #2e7d32; }
        .status-wait { background: #fff3e0; color: #e65100; }
        
        /* Juego */
        .players-row { 
            display: flex; gap: 10px; overflow-x: auto; margin-bottom: 5px; flex-shrink: 0; min-height: 50px;
        }
        .player-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            min-width: 90px;
            text-align: center;
            color: white;
        }
        .player-card.active { background: rgba(255,215,0,0.4); border: 2px solid gold; }
        .center-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 5px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            flex-shrink: 0;
        }

        .my-hand {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            flex: 1;
            position: relative;
        }
        .my-hand .carta {
            margin-left: -35px;
            transform-origin: bottom center;
        }
        .my-hand .carta:first-child { margin-left: 0; }

        .card-pile {
            width: 80px; 
            height: 123px; 
            background: #2c1a10;
            border-radius: 10px;
            border: 2px solid #ffd966;
            cursor: pointer;
        }

        .carta {
            width: 80px; 
            height: 123px; 
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px black;
            position: relative;
        }
        .carta.selected { filter: drop-shadow(0 0 8px gold); }
        .game-buttons { display: flex; gap: 10px; justify-content: center; margin: 5px 0; flex-shrink: 0; }
        button { width: auto; padding: 10px 18px; }
.log {
    background: rgba(0,0,0,0.5);
    color: #f7eac5;
    border-radius: 15px;
    padding: 8px;
    font-size: 0.8rem;
    margin-top: 5px;
    height: 90px;
    overflow-y: auto;
    flex-shrink: 0;
}
.turno {
    position: relative; 
    margin: 5px auto;
    width: fit-content;
    padding: 8px 25px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 10;
}
        .turno.mio { background: #4caf50; color: white; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        @media (max-width: 500px) {
            .carta { width: 55px; height: 85px; }
            .card-pile { width: 62px; height: 95px; }
            .my-hand .carta { margin-left: -28px; }
            .center-area { padding: 5px; gap: 15px; margin: 2px 0;}
            .players-row { margin-bottom: 2px; }
            .player-card { min-width: 70px; padding: 5px; font-size: 0.8rem; }
            button { padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Pantalla inicio -->
    <div id="startScreen" class="screen">
        <input type="text" id="playerNameInput" placeholder="Tu Nombre" maxlength="12" style="text-align: center; margin-bottom: 10px;">
        <h1>🎴 Chinchón Online</h1>
        <button class="btn-green" id="createBtn">🏠 Crear Partida</button>
        <div style="margin: 10px 0;">o</div>
        <input type="text" id="roomCode" placeholder="Código" maxlength="6">
        <button id="joinBtn">🔗 Unirse</button>
        <div class="status status-wait" id="statusMsg">Conectando a Firebase...</div>
    </div>

    <!-- Pantalla sala (Lobby) -->
    <div id="lobbyScreen" class="screen hidden">
        <div id="hostConfig" class="hidden" style="background: rgba(0,0,0,0.05); padding: 10px; border-radius: 20px; margin: 5px 0; text-align: left; font-size: 0.85rem;">
            <div style="display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h3 style="margin:0; color: #2c5a2a;">⚙️ Juego</h3>
                <select id="gameTypeInput" style="flex: 1; padding: 5px; border-radius: 8px; font-weight: bold;">
                    <option value="chinchon">Chinchón</option>
                    <option value="truco">Truco</option>
                    <option value="escoba" disabled>Escoba (Próximamente)</option>
                </select>
            </div>
            
            <div id="chinchonConfig" style="display: flex; gap: 5px; flex-wrap: wrap;">
                <label style="flex: 1; min-width: 80px;">Puntos: 
                    <select id="maxPtsInput" style="width: 100%; padding: 5px; border-radius: 8px;">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="200">200</option>
                    </select>
                </label>
                
                <label style="flex: 1; min-width: 80px;">Comodines: 
                    <input type="number" id="comodinesInput" value="2" min="0" max="4" style="width: 100%; padding: 5px; border-radius: 8px;">
                </label>
                
                <label style="flex: 1; min-width: 80px;">Cierro: 
                    <select id="cierreInput" style="width: 100%; padding: 5px; border-radius: 8px;">
                        <option value="10"><=10 pts</option>
                        <option value="5" selected><=5 pts</option>
                        <option value="0">0 pts</option>
                    </select>
                </label>
            </div>
            
            <div id="trucoConfig" style="display: none; gap: 5px; flex-wrap: wrap;">
                <label style="flex: 1; min-width: 80px;">Puntos: 
                    <select id="trucoPtsInput" style="width: 100%; padding: 5px; border-radius: 8px;">
                        <option value="15">A 15 (Chico)</option>
                        <option value="30" selected>A 30 (Grande)</option>
                    </select>
                </label>
                
                <label style="flex: 1; min-width: 80px;">Flor: 
                    <select id="trucoFlorInput" style="width: 100%; padding: 5px; border-radius: 8px;">
                        <option value="sin" selected>Sin Flor</option>
                        <option value="con">Con Flor</option>
                    </select>
                </label>
            </div>
        </div>
        <h1>Sala</h1>
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 15px;">
            <div class="code-box" id="codeDisplay" style="margin:0; flex: 1;">----</div>
            <button id="copyCodeBtn" style="padding: 10px 15px; border-radius: 15px; background: #4a3727; color: #ffd966; border: 1px solid #ffd966; box-shadow: none;">
                📋 Copiar
            </button>
        </div>
        <ul class="players-list" id="playersList"></ul>
        <button class="btn-green" id="startGameBtn">🎮 Empezar</button>
        <button id="resetTournamentBtn" class="hidden" style="background: #2196F3; color: white; width: 100%; margin-top: 10px;">🔄 Reiniciar Torneo (Puntos a 0)</button>
        <button id="abandonBtn" style="background: #f44336; color: white; width: 100%;">🚪 Abandonar Sala</button>
        <div class="status status-wait" id="lobbyStatus">Esperando jugadores...</div>
    </div>


</div>


<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ============================================================
    // 🔥 PONÉ ACÁ TU CONFIGURACIÓN DE FIREBASE 🔥
    // ============================================================
    const firebaseConfig = {
  apiKey: "AIzaSyBq3DeZQz9-4gpOe2YyVPLRRAv8jsGcldk",
  authDomain: "juegoscartas-eac64.firebaseapp.com",
  databaseURL: "https://juegoscartas-eac64-default-rtdb.firebaseio.com",
  projectId: "juegoscartas-eac64",
  storageBucket: "juegoscartas-eac64.firebasestorage.app",
  messagingSenderId: "671826149545",
  appId: "1:671826149545:web:f9f706575f4d3df3b229b8"
};
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
// --- AUDIO ---
const sfx = {
    turno: new Audio('sounds/turno.mp3'),
    ganar: new Audio('sounds/ganar.mp3'),
    perder: new Audio('sounds/perder.mp3'),
    carta: new Audio('sounds/carta.mp3')
};

function playSfx(nombre) {
    sfx[nombre].currentTime = 0;
    sfx[nombre].play().catch(() => {}); // El catch evita errores si el navegador bloquea el audio
}

    // ============================================================
    // 🃏 IMAGEN DE LA BARAJA
    // ============================================================
    const IMAGE_FILE = "Baraja_española_completa.png";
const CARD_W = 208, CARD_H = 319; 
const SPRITE_W = 2496, SPRITE_H = 1595;
    const PALO_FILA = { "oros": 0, "copas": 1, "espadas": 2, "bastos": 3 };
    let SPRITE_URL = null;
    
function cardBG(carta) {
    if (!SPRITE_URL) return "background: #4a3727;";
    let fila, col;
    if (carta.comodin) { 
        fila = 4; col = 0; 
    } else { 
        fila = PALO_FILA[carta.palo]; 
        col = carta.numero - 1; 
    }
    
    // La imagen tiene 12 columnas (0 a 11) y 5 filas (0 a 4)
    // Usamos porcentajes exactos para que el navegador recorte bien en cualquier zoom
    const xPercent = (col * 100) / 11; 
    const yPercent = (fila * 100) / 4;  
    
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}



function dorso() {
    if (!SPRITE_URL) return "background: #4a3727;";
    // El dorso está en la fila 5, columna 2 (índice 4, 1)
    const xPercent = (1 * 100) / 11;
    const yPercent = (4 * 100) / 4;
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}


    // ============================================================
    // 🎮 LÓGICA DEL JUEGO
    // ============================================================
    const PALOS = ["oros", "copas", "espadas", "bastos"];
    
    function crearBaraja() {
        let b = [];
        for(let p of PALOS) for(let n=1; n<=12; n++) b.push({ palo: p, numero: n, comodin: false });
        b.push({ palo: "comodin", numero: 0, comodin: true });
        return b;
    }
    
    function mezclar(a) { for(let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function valorCarta(c) { if(c.comodin) return 0; if(c.numero >= 10) return 10; return c.numero; }
    

    // ============================================================
    // 🔥 MULTIJUGADOR Y PERSISTENCIA
    // ============================================================
    
    // Recuperamos o generamos el ID único del dispositivo
    let ultimoEstadoGalactico = null; 
    let lastProcessedLog = 0;
    let myId = localStorage.getItem("chinchon_myId");
    if (!myId) {
        myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem("chinchon_myId", myId);
    }

    // Recuperamos el nombre si ya lo usó antes
    let myName = localStorage.getItem("chinchon_myName") || "";

    let roomId = null, isHost = false;
    let players = [], gameRef = null;
    let myHand = [], deck = [], discardPile = [], currentTurn = null;
    let gameActive = false, rondaEnCurso = false, hasDrawn = false, selectedCard = null;
    let myPoints = 0, otherPlayers = [];

    // DOM
    const startScreen = document.getElementById("startScreen");
    const lobbyScreen = document.getElementById("lobbyScreen");
    const statusMsg = document.getElementById("statusMsg");
    const codeDisplay = document.getElementById("codeDisplay");
    const playersList = document.getElementById("playersList");
    const lobbyStatus = document.getElementById("lobbyStatus");
    const startGameBtn = document.getElementById("startGameBtn");
    const playersRow = document.getElementById("playersRow");
    const deckPile = document.getElementById("deckPile");
    const deckCount = document.getElementById("deckCount");
    const discardPileDiv = document.getElementById("discardPile");
    const myHandDiv = document.getElementById("myHand");
    const logDiv = document.getElementById("log");
    const turnText = document.getElementById("turnText");
    const closeBtn = document.getElementById("closeBtn");
    
    function addLog(msg) { 
    logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML; 
    if(logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild); 
}
    
    function generarCodigo() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generarId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    


function abandonarPartida() {
    if (confirm("¿Estás seguro de que querés salir?")) {
        if (isHost && gameRef) {
            gameRef.remove(); 
        } else if (gameRef && myId) {
            // Si no soy host, me elimino de la lista de jugadores
            let nuevosPlayers = players.filter(p => p.id !== myId);
            gameRef.update({ players: nuevosPlayers });
        }
        
        localStorage.removeItem("chinchon_roomId");
        localStorage.removeItem("esAnfitrion");
        window.location.reload();
    }
}






// --- ASIGNACIÓN DE EVENTOS SEGURA (USÁ SOLO ESTA) ---
const btnAbandonar = document.getElementById("abandonBtn");
if (btnAbandonar) btnAbandonar.onclick = abandonarPartida;

const gameTypeInput = document.getElementById("gameTypeInput");
const copyCodeBtn = document.getElementById("copyCodeBtn");
if (copyCodeBtn) {
    copyCodeBtn.onclick = () => {
        if (roomId) {
            navigator.clipboard.writeText(roomId);
            const originalText = "📋 Copiar";
            copyCodeBtn.innerText = "✅ ¡Copiado!";
            setTimeout(() => { copyCodeBtn.innerText = originalText; }, 2000);
        } else {
            alert("No hay código de sala todavía");
        }
    };
}
if (gameTypeInput) {
    gameTypeInput.addEventListener("change", (e) => {
        const val = e.target.value;
        document.getElementById("chinchonConfig").style.display = val === "chinchon" ? "flex" : "none";
        document.getElementById("trucoConfig").style.display = val === "truco" ? "flex" : "none";
    });
}


// ========== SALAS ==========
document.getElementById("createBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        roomId = generarCodigo();
        isHost = true;
        localStorage.setItem("esAnfitrion", "true"); // Guardamos que es el jefe
        players = [{ id: myId, name: myName, points: 0 }];
        codeDisplay.innerText = roomId;
        actualizarSala();
        
        gameRef = db.ref("games/" + roomId);
        gameRef.set({ hostId: myId, players: players, status: "waiting", createdAt: Date.now() });
        
        gameRef.on("value", (snap) => {
            let data = snap.val();
            if(data) {
                players = data.players || [];
                actualizarSala();
                if(data.status === "playing" && data.gameState) {
                    let type = (data.gameState.config && data.gameState.config.gameType) ? data.gameState.config.gameType : 'chinchon';
                    window.location.href = type + ".html?roomId=" + roomId + "&myId=" + myId + "&myName=" + encodeURIComponent(myName) + "&isHost=" + isHost;
                }
            }
        });
        
        mostrarLobby(true);
        localStorage.setItem("chinchon_roomId", roomId);
    };
    
    document.getElementById("joinBtn").onclick = () => {
        let inputNombre = document.getElementById("playerNameInput").value.trim();
        if (!inputNombre) { alert("¡Poné tu nombre!"); return; }
        myName = inputNombre;
        localStorage.setItem("chinchon_myName", myName); // Lo guardamos para la próxima vez
        let code = document.getElementById("roomCode").value.trim();
        if(code.length !== 6) { alert("Código de 6 dígitos"); return; }
        roomId = code;
        isHost = false;
        
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            let data = snap.val();
            if(!data) { alert("Sala no encontrada"); return; }
    
    // Verificamos si ya éramos parte de esta partida
    let yaEstabaEnLaPartida = data.players && data.players.some(p => p.id === myId);

    // Si la partida comenzó y NO somos uno de los jugadores, entonces bloqueamos
    if(data.status === "playing" && !yaEstabaEnLaPartida) { 
        alert("Partida ya comenzó y no eres parte de ella."); 
        return; 
    }
    
    // Si no estábamos, nos agregamos (solo si la partida no empezó)
    if(!yaEstabaEnLaPartida) {
        let newPlayers = [...(data.players || []), { id: myId, name: myName, points: 0 }];
        gameRef.update({ players: newPlayers });
    }
    
    // El resto del código (.on("value") y mostrarLobby) sigue igual...
    gameRef.on("value", (snap) => {
        let newData = snap.val();
        if(newData) {
            players = newData.players || [];
            actualizarSala();
            if(newData.status === "playing" && newData.gameState) {
                let type = (newData.gameState.config && newData.gameState.config.gameType) ? newData.gameState.config.gameType : 'chinchon';
                window.location.href = type + ".html?roomId=" + roomId + "&myId=" + myId + "&myName=" + encodeURIComponent(myName) + "&isHost=" + isHost;
            }
        }
    });
    mostrarLobby(false);
    localStorage.setItem("chinchon_roomId", roomId);
});

    };
    
function actualizarSala() {
    // 1. Mantener el código de sala visible
    if (roomId) {
        document.getElementById("codeDisplay").innerText = roomId;
    }

    // 2. Definir el límite de puntos (usamos el del Host o 100 por defecto)
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) ? ultimoEstadoGalactico.config.maxPts : 100;
    
    // 3. Verificamos si alguien ya perdió (llegó o pasó el límite)
    let hayPerdedor = players.some(p => (p.points || 0) >= limite);

    // 4. Dibujar la lista con calaveras si alguien perdió
    playersList.innerHTML = players.map(p => {
        let pts = p.points || 0;
        let perdio = pts >= limite;
        return `<li>${perdio ? "💀" : "👤"} ${p.name} ${p.id === myId ? "(tú)" : ""}: <b>${pts} pts</b></li>`;
    }).join("");

    // 5. Lógica de botones para el Host
    if(isHost) {
        const resetBtn = document.getElementById("resetTournamentBtn");

        if (hayPerdedor) {
            // Si alguien perdió, bloqueamos el de Empezar y mostramos el de Reiniciar
            startGameBtn.disabled = true;
            startGameBtn.style.opacity = "0.5";
            startGameBtn.innerText = "🏁 Partida Finalizada";
            
            if (resetBtn) resetBtn.classList.remove("hidden");
            
            lobbyStatus.innerHTML = "🏆 Alguien llegó al límite. ¡Reiniciá para jugar otra vez!";
            lobbyStatus.className = "status status-wait";
        } else {
            // Si nadie perdió todavía, flujo normal
            if (resetBtn) resetBtn.classList.add("hidden");
            startGameBtn.innerText = "🎮 Empezar Ronda";
            
            if (players.length >= 2) {
                startGameBtn.disabled = false;
                startGameBtn.style.opacity = "1";
                lobbyStatus.innerHTML = "✅ ¡Listo para la siguiente ronda!";
                lobbyStatus.className = "status status-ok";
            } else {
                startGameBtn.disabled = true;
                startGameBtn.style.opacity = "0.5";
                lobbyStatus.innerHTML = "⏳ Esperando jugadores...";
                lobbyStatus.className = "status status-wait";
            }
        }
    }
}

    
    function mostrarLobby(host) {
        startScreen.classList.add("hidden");
        lobbyScreen.classList.remove("hidden");
        if(!host) {
            startGameBtn.classList.add("hidden");
            lobbyStatus.innerHTML = "Conectado. Esperando al anfitrión...";
        } else {
            startGameBtn.classList.remove("hidden");
        }
        document.getElementById("hostConfig").classList.toggle("hidden", !host);
    }
    
function actualizarJuego() {} // Función dummy restaurada por petición de compatibilidad

    
startGameBtn.onclick = () => {
    if(isHost && players.length >= 2) {
        const gameType = document.getElementById("gameTypeInput").value || "chinchon";
        
        let baraja = [];
        let mazo = [];
        let desc = [];
        let manos = {};
        let puntosPersistentes = {};
        let gameStateConfig = { gameType };
        
        if (gameType === "chinchon") {
            const maxPts = parseInt(document.getElementById("maxPtsInput").value) || 100;
            const cantComodines = parseInt(document.getElementById("comodinesInput").value) || 0;
            const limiteCierre = parseInt(document.getElementById("cierreInput").value) || 5;
            gameStateConfig.maxPts = maxPts;
            gameStateConfig.limiteCierre = limiteCierre;
            
            for(let p of PALOS) {
                for(let n=1; n<=12; n++) baraja.push({ palo: p, numero: n, comodin: false });
            }
            for(let i=0; i<cantComodines; i++) baraja.push({ palo: "comodin", numero: 0, comodin: true });
            
            mazo = mezclar(baraja);
            desc = [mazo.pop()];
            
            players.forEach((p, index) => {
                puntosPersistentes[p.id] = 0;
                p.points = 0; // Reset local para el lobby
                let mano = [];
                for(let i=0; i<7; i++) mano.push(mazo.pop());
                manos[p.id] = mano;
            });
            
        } else if (gameType === "truco") {
            const maxPts = parseInt(document.getElementById("trucoPtsInput").value) || 30;
            const flor = document.getElementById("trucoFlorInput").value === "con";
            gameStateConfig.maxPts = maxPts;
            gameStateConfig.flor = flor;
            
            for(let p of PALOS) {
                for(let n=1; n<=12; n++) {
                    if (n !== 8 && n !== 9) baraja.push({ palo: p, numero: n, comodin: false });
                }
            }
            
            mazo = mezclar(baraja);
            desc = []; // No hay descarte en truco por ahora
            
            players.forEach((p, index) => {
                puntosPersistentes[p.id] = 0;
                p.points = 0; // Reset local
                let mano = [];
                for(let i=0; i<3; i++) mano.push(mazo.pop());
                manos[p.id] = mano;
            });
        }

        let estado = {
            deck: mazo,
            discardPile: desc,
            hands: manos,
            currentTurn: players[0].id, 
            points: puntosPersistentes,
            rondaEnCurso: true,
            hasDrawn: false,
            config: gameStateConfig,
            // Nuevas variables para Truco
            envidoFinalizado: false,
            nivelTruco: 0,
            idDuenioTruco: null,
            valorMano: 1
        };
        
        gameRef.update({ 
            players: players,
            gameState: estado, 
            status: "playing"
        });
    }
};

const btnReset = document.getElementById("resetTournamentBtn");
if (btnReset) {
    btnReset.onclick = () => {
        if (confirm("¿Reiniciar todos los puntos a 0 para empezar un nuevo torneo?")) {
            let actualizaciones = {};
            players.forEach((p, index) => {
                actualizaciones[`players/${index}/points`] = 0;
            });
            actualizaciones["gameState"] = null;
            gameRef.update(actualizaciones);
        }
    };
}

    
function iniciarJuego(estado) {
    // 1. Carga inicial de variables
    myHand = (estado.hands && estado.hands[myId]) ? estado.hands[myId] : [];
    deck = estado.deck || [];
    discardPile = estado.discardPile || [];
    currentTurn = estado.currentTurn;
    myPoints = (estado.points && estado.points[myId]) ? estado.points[myId] : 0;
    
    rondaEnCurso = estado.rondaEnCurso;
    hasDrawn = estado.hasDrawn || false;
    gameActive = true;
    selectedCard = null;
    
    otherPlayers = players.filter(p => p.id !== myId).map(p => ({
        id: p.id, name: p.name, points: (estado.points && estado.points[p.id]) || 0
    }));
    
    startScreen.classList.add("hidden");
    lobbyScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    actualizarJuego();
    
    // 2. Listener en tiempo real
    gameRef.child("gameState").on("value", (snap) => {
        let nuevo = snap.val();
        if(nuevo) {
            ultimoEstadoGalactico = nuevo; 

            if (nuevo.currentTurn === myId && currentTurn !== myId) {
                playSfx('turno');
            }

            let anteriorRonda = rondaEnCurso; 
            deck = nuevo.deck || [];
            discardPile = nuevo.discardPile || [];
            rondaEnCurso = nuevo.rondaEnCurso;
            currentTurn = nuevo.currentTurn;
            hasDrawn = nuevo.hasDrawn || false;

            if(nuevo.hands && nuevo.hands[myId]) {
                myHand = Array.isArray(nuevo.hands[myId]) ? nuevo.hands[myId] : Object.values(nuevo.hands[myId]);
            }

            if(nuevo.points) {
                myPoints = nuevo.points[myId] || 0;
                otherPlayers.forEach(op => {
                    if(nuevo.points[op.id] !== undefined) op.points = nuevo.points[op.id];
                });
            }

            if (nuevo.lastLog && nuevo.lastLog.time !== lastProcessedLog) {
                lastProcessedLog = nuevo.lastLog.time;
                addLog(nuevo.lastLog.msg);
            }

            // 3. DETECTAR CIERRE DE RONDA, PUNTOS Y GANADOR FINAL
            if(nuevo.winner && anteriorRonda === true && rondaEnCurso === false) {
                if(nuevo.winner === myId) playSfx('ganar');
                else playSfx('perder');
                
                let limite = (nuevo.config && nuevo.config.maxPts) ? nuevo.config.maxPts : 100;
                let alguienPerdioDefinitivamente = false;
                let resumen = "📊 RESULTADOS DE LA RONDA:\n\n";
                
                players.forEach(p => {
                    let manoJugador = nuevo.hands ? (nuevo.hands[p.id] || []) : [];
                    let ptsGanados = (p.id === nuevo.winner) ? calcularMejorPuntaje(manoJugador) : puntosSueltas(manoJugador);
                    
                    // Actualizamos los puntos localmente para la lista del lobby
                    p.points = nuevo.points[p.id]; 
                    resumen += `${p.name}: +${ptsGanados} pts (Total: ${p.points})\n`;
                    
                    if (p.points >= limite) alguienPerdioDefinitivamente = true;
                });
                
                alert(resumen); 

                // Si alguien perdió, anunciamos al campeón absoluto
                if (alguienPerdioDefinitivamente) {
                    let ganadorFinal = players.reduce((prev, curr) => (prev.points < curr.points) ? prev : curr);
                    alert(`🏆 ¡PARTIDA TERMINADA! 🏆\nEl campeón es ${ganadorFinal.name} con ${ganadorFinal.points} puntos.`);
                    if(isHost) gameRef.update({ status: "finished" });
                }

                setTimeout(() => { 
                    if(isHost) {
                        gameRef.child("gameState").update({ winner: null, rondaEnCurso: false });
                    }
                    
                    gameScreen.classList.add("hidden");
                    lobbyScreen.classList.remove("hidden");
                    
                    // Sincronizamos la lista de jugadores con los puntos grabados en Firebase
                    gameRef.once("value", (snap) => {
                        let d = snap.val();
                        if(d && d.players) {
                            players = d.players;
                        }
                        actualizarSala(); 
                    });
                }, 1000);
            }

            actualizarJuego();
        }
    });
}

    // Cargar imagen
    const img = new Image();
    img.onload = () => { SPRITE_URL = IMAGE_FILE; statusMsg.innerHTML = "✅ Listo!"; };
    img.onerror = () => { statusMsg.innerHTML = "⚠️ Imagen no encontrada"; };
    img.src = IMAGE_FILE;
window.addEventListener('load', () => {
    if (myName) document.getElementById("playerNameInput").value = myName;

    let lastRoom = localStorage.getItem("chinchon_roomId");
    if (lastRoom) {
        roomId = lastRoom;
        isHost = localStorage.getItem("esAnfitrion") === "true";
        
        // Conectamos a la sala automáticamente
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            if(snap.exists()) {
                // Si la partida ya empezó, el listener de abajo nos meterá al juego
                gameRef.on("value", (snap) => {
                    let data = snap.val();
                    if(data) {
                        players = data.players || [];
                        if(data.status === "playing" && data.gameState) {
                            let type = (data.gameState.config && data.gameState.config.gameType) ? data.gameState.config.gameType : 'chinchon';
                            window.location.href = type + ".html?roomId=" + roomId + "&myId=" + localStorage.getItem("chinchon_myId") + "&myName=" + encodeURIComponent(document.getElementById("playerNameInput").value || localStorage.getItem("chinchon_myName") || "") + "&isHost=" + isHost;
                        }
                        else mostrarLobby(isHost);
                    }
                });
            }
        });
    }
});




</script>
