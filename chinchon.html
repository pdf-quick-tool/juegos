<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chinchón Online - Firebase</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: system-ui, sans-serif;
            padding: 8px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { 
            width: 100%; 
            max-width: 550px; 
            margin: 0 auto; 
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #gameScreen {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }
        #gameScreen.hidden {
            display: none !important;
        }
        .screen {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            overflow-y: auto;
        }
        h1 { color: #2c5a2a; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
        }
        button { background: #f3b33d; cursor: pointer; box-shadow: 0 3px 0 #7a4c1a; }
        button:active { transform: translateY(2px); }
        .btn-green { background: #2e7d32; color: white; }
        .code-box {
            background: #2c1a10;
            color: #ffd966;
            padding: 10px;
            border-radius: 20px;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 5px 0;
        }
        .players-list {
            list-style: none;
            margin: 5px 0;
            max-height: 120px;
            overflow-y: auto;
            padding: 0;
        }
        .players-list li {
            background: #e0e0e0;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 30px;
        }
        .hidden { display: none; }
        .status {
            padding: 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .status-ok { background: #c8e6c9; color: #2e7d32; }
        .status-wait { background: #fff3e0; color: #e65100; }
        
        /* Juego */
        .players-row { 
            display: flex; gap: 10px; overflow-x: auto; margin-bottom: 5px; flex-shrink: 0; min-height: 50px;
        }
        .player-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            min-width: 90px;
            text-align: center;
            color: white;
        }
        .player-card.active { background: rgba(255,215,0,0.4); border: 2px solid gold; }
        .player-card.eliminated { opacity: 0.4; text-decoration: line-through; border-color: red; }

        /* Estilos del Modal de Resultados */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .result-modal {
            background: #2c1e16;
            border: 3px solid #f3b33d;
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .score-row-result {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            align-items: center;
        }
        .score-row-result.eliminated { border: 1px solid #ff4444; color: #ff8888; }
        .score-row-result.winner { border: 2px solid #f3b33d; }
        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-verde { background: #2e7d32; color: white; }
        .btn-rojo { background: #b71c1c; color: white; }

        .center-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 5px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            flex-shrink: 0;
        }

        .my-hand {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            flex: 1;
            position: relative;
        }
        .my-hand .carta {
            margin-left: -35px;
            transform-origin: bottom center;
        }
        .my-hand .carta:first-child { margin-left: 0; }

        .card-pile {
            width: 80px; 
            height: 123px; 
            background: #2c1a10;
            border-radius: 10px;
            border: 2px solid #ffd966;
            cursor: pointer;
        }

        .carta {
            width: 80px; 
            height: 123px; 
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px black;
            position: relative;
        }
        .carta.selected { filter: drop-shadow(0 0 8px gold); }
        .carta-mini {
            width: 30px; 
            height: 46px; 
            border-radius: 4px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-left: -5px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .carta-mini:first-child { margin-left: 0; }
        .game-buttons { display: flex; gap: 10px; justify-content: center; margin: 5px 0; flex-shrink: 0; }
        button { width: auto; padding: 10px 18px; }
.log {
    background: rgba(0,0,0,0.5);
    color: #f7eac5;
    border-radius: 15px;
    padding: 8px;
    font-size: 0.8rem;
    margin-top: 5px;
    height: 90px;
    overflow-y: auto;
    flex-shrink: 0;
}
.turno {
    position: relative; 
    margin: 5px auto;
    width: fit-content;
    padding: 8px 25px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 10;
}
        .turno.mio { background: #4caf50; color: white; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        @media (max-width: 500px) {
            .carta { width: 55px; height: 85px; }
            .card-pile { width: 62px; height: 95px; }
            .my-hand .carta { margin-left: -28px; }
            .center-area { padding: 5px; gap: 15px; margin: 2px 0;}
            .players-row { margin-bottom: 2px; }
            .player-card { min-width: 70px; padding: 5px; font-size: 0.8rem; }
            button { padding: 8px 12px; }
        }
    </style>
</head>

    <!-- Pantalla juego -->

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">

<script>

// --- AUDIO ---
const sfx = {
    turno: new Audio('sounds/turno.mp3'),

function playSfx(nombre) {

    // ============================================================
    // 🃏 IMAGEN DE LA BARAJA
    // ============================================================
    const IMAGE_FILE = "Baraja_española_completa.png";
const CARD_W = 208, CARD_H = 319; 
const SPRITE_W = 2496, SPRITE_H = 1595;
    const PALO_FILA = { "oros": 0, "copas": 1, "espadas": 2, "bastos": 3 };
    let SPRITE_URL = null;
    
function cardBG(carta) {
    if (!SPRITE_URL) return "background: #4a3727;";
    let fila, col;
    if (carta.comodin) { 
        fila = 4; col = 0; 
    } else { 
        fila = PALO_FILA[carta.palo]; 
        col = carta.numero - 1; 
    }
    
    // La imagen tiene 12 columnas (0 a 11) y 5 filas (0 a 4)
    // Usamos porcentajes exactos para que el navegador recorte bien en cualquier zoom
    const xPercent = (col * 100) / 11; 
    const yPercent = (fila * 100) / 4;  
    
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}



function dorso() {
    if (!SPRITE_URL) return "background: #4a3727;";
    // El dorso está en la fila 5, columna 2 (índice 4, 1)
    const xPercent = (1 * 100) / 11;
    const yPercent = (4 * 100) / 4;
    return `background-image: url('${SPRITE_URL}'); 
            background-position: ${xPercent}% ${yPercent}%; 
            background-size: 1200% 500%; 
            background-repeat: no-repeat;`;
}


    // ============================================================
    // 🎮 LÓGICA DEL JUEGO
    // ============================================================
    const PALOS = ["oros", "copas", "espadas", "bastos"];
    
    function crearBaraja() {
        let b = [];
        for(let p of PALOS) for(let n=1; n<=12; n++) b.push({ palo: p, numero: n, comodin: false });
        b.push({ palo: "comodin", numero: 0, comodin: true });
        return b;
    }
    
    function mezclar(a) { for(let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function valorCarta(c) { if(c.comodin) return 25; if(c.numero >= 10) return 10; return c.numero; }

    function esChinchon(mano) {
        if (!mano || mano.length < 7) return false;
        // Solo puede haber Chinchón si no usamos comodines (regla estándar) o si la escalera es perfecta de 7
        // Probamos todas las combinaciones de cartas por si tiene 8 cartas (la robada)
        for (let i = 0; i < mano.length; i++) {
            let sub = [...mano];
            sub.splice(i, 1);
            if (esEscaleraPerfectaDe7(sub)) return true;
        }
        return false;
    }

    function esEscaleraPerfectaDe7(c) {
        if (c.length !== 7) return false;
        let p = c[0].palo;
        if (!c.every(item => item.palo === p && !item.comodin)) return false;
        let nums = c.map(item => item.numero).sort((a,b) => a-b);
        for (let i = 0; i < nums.length - 1; i++) {
            if (nums[i+1] !== nums[i] + 1) return false;
        }
        return true;
    }
    
function puntosSueltas(mano) {
    if (!mano || mano.length === 0) return 0;

    const normales = mano.filter(c => !c.comodin);
    const cantComodines = mano.filter(c => c.comodin).length;

    // Función principal que prueba todas las rutas
    function resolver(cartas, comodines) {
        if (cartas.length === 0) return 0;

        let mejorPuntaje = calcularSuma(cartas);

        // 1. Intentar buscar ESCALERAS
        for (let i = 0; i < cartas.length; i++) {
            for (let j = i + 1; j < cartas.length; j++) {
                // Buscamos una tercera carta o usamos un comodín para completar 3
                for (let k = j + 1; k <= cartas.length; k++) {
                    let combo = [cartas[i], cartas[j]];
                    let usados = 0;
                    
                    if (k < cartas.length) combo.push(cartas[k]);
                    else if (comodines > 0) usados = 1;
                    else continue;

                    if (esEscaleraValida(combo, usados)) {
                        let resto = filtrarCartas(cartas, combo);
                        mejorPuntaje = Math.min(mejorPuntaje, resolver(resto, comodines - usados));
                    }
                }
            }
        }

        // 2. Intentar buscar GRUPOS
        for (let i = 0; i < cartas.length; i++) {
            for (let j = i + 1; j < cartas.length; j++) {
                let combo = [cartas[i], cartas[j]];
                let usados = 0;
                
                // Probamos con una tercera carta o con un comodín
                for (let k = j + 1; k <= cartas.length; k++) {
                    let subCombo = [...combo];
                    let subUsados = 0;
                    if (k < cartas.length) subCombo.push(cartas[k]);
                    else if (comodines > 0) subUsados = 1;
                    else continue;

                    if (esGrupoValido(subCombo, subUsados)) {
                        let resto = filtrarCartas(cartas, subCombo);
                        mejorPuntaje = Math.min(mejorPuntaje, resolver(resto, comodines - subUsados));
                    }
                }
            }
        }

        return mejorPuntaje;
    }

    // Funciones auxiliares de validación
    function esEscaleraValida(c, com) {
        if (c.length + com < 3) return false;
        let p = c[0].palo;
        if (!c.every(item => item.palo === p)) return false;
        let nums = c.map(item => item.numero).sort((a,b) => a-b);
        // Validamos huecos con comodines
        let huecos = 0;
        for (let i = 0; i < nums.length - 1; i++) {
            huecos += (nums[i+1] - nums[i] - 1);
        }
        return huecos <= com;
    }

    function esGrupoValido(c, com) {
        if (c.length + com < 3) return false;
        let n = c[0].numero;
        let palos = new Set(c.map(item => item.palo));
        return c.every(item => item.numero === n) && palos.size === c.length;
    }

    function filtrarCartas(todas, usadas) {
        let resultado = [...todas];
        usadas.forEach(u => {
            let idx = resultado.findIndex(r => r.numero === u.numero && r.palo === u.palo);
            if (idx !== -1) resultado.splice(idx, 1);
        });
        return resultado;
    }

    function calcularSuma(c) {
        return c.reduce((acc, curr) => acc + valorCarta(curr), 0);
    }

    return resolver(normales, cantComodines);
}

    
function puedeCerrar(mano) {
    if (mano.length < 8) return false;

    // Leemos la configuración que mandó el Host desde el estado global
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) 
                 ? ultimoEstadoGalactico.config.limiteCierre 
                 : 5;

    let minimoPuntosPosibles = 999;

    for (let i = 0; i < mano.length; i++) {
        let manoParaEvaluar = [...mano];
        manoParaEvaluar.splice(i, 1); 
        
        let pts = puntosSueltas(manoParaEvaluar);
        if (pts < minimoPuntosPosibles) {
            minimoPuntosPosibles = pts;
        }
    }

    return minimoPuntosPosibles <= limite;
}

    // ============================================================
    // 🔥 MULTIJUGADOR Y PERSISTENCIA
    // ============================================================
    
    // Recuperamos o generamos el ID único del dispositivo
    let ultimoEstadoGalactico = null; 
    let lastProcessedLog = 0;
    const urlParams = new URLSearchParams(window.location.search);
    let myId = urlParams.get('myId') || localStorage.getItem("chinchon_myId");
    if (!myId) {
        myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }
    localStorage.setItem("chinchon_myId", myId);

    let myName = urlParams.get('myName') || localStorage.getItem("chinchon_myName") || "";
    let roomId = urlParams.get('roomId') || localStorage.getItem("chinchon_roomId") || null;
    let isHost = urlParams.has('isHost') ? (urlParams.get('isHost') === 'true') : (localStorage.getItem("esAnfitrion") === "true");
    let players = [], gameRef = null;
    let myHand = [], deck = [], discardPile = [], currentTurn = null;
    let gameActive = false, rondaEnCurso = false, hasDrawn = false, selectedCard = null;
    let myPoints = 0, otherPlayers = [];

    // DOM
    const gameScreen = document.getElementById("gameScreen");
    const playersRow = document.getElementById("playersRow");
    const deckPile = document.getElementById("deckPile");
    const deckCount = document.getElementById("deckCount");
    const discardPileDiv = document.getElementById("discardPile");
    const myHandDiv = document.getElementById("myHand");
    const logDiv = document.getElementById("log");
    const turnText = document.getElementById("turnText");
    const closeBtn = document.getElementById("closeBtn");
    
    function addLog(msg) { 
    logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML; 
    if(logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild); 
}
    
    function generarCodigo() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generarId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    // UI del juego
    function actualizarJuego() {
    // 1. Inicialización de seguridad
    if (!deck) deck = [];
    if (!myHand) myHand = [];
    if (!discardPile) discardPile = [];
    if (!otherPlayers) otherPlayers = [];

    // 2. Dibujar Oponentes
    playersRow.innerHTML = "";
    players.forEach(p => {
        const card = document.createElement("div");
        card.className = "player-card";
        if(p.id === currentTurn) card.classList.add("active");
        
        // Marcar eliminados (puntos > limite o undefined en el juego activo si se prefiere)
        let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) ? ultimoEstadoGalactico.config.maxPts : 100;
        if (p.points > limite) card.classList.add("eliminated");

        card.innerHTML = `
            <div style="font-weight: bold; margin-bottom: 5px;">${p.name}</div>
            <div style="font-size: 1.2rem; color: #f3b33d;">${p.points || 0} pts</div>
        `;
        playersRow.appendChild(card);
    });

    // GESTIÓN DEL MODAL DE RESULTADOS
    const modal = document.getElementById("roundResultModal");
    if (ultimoEstadoGalactico && !ultimoEstadoGalactico.rondaEnCurso) {
        modal.style.display = "flex";
        let rScores = document.getElementById("resultScores");
        let limite = (ultimoEstadoGalactico.config && ultimoEstadoGalactico.config.maxPts) || 100;
        
        rScores.innerHTML = players.map(p => {
            let ptsActuales = (ultimoEstadoGalactico.points && ultimoEstadoGalactico.points[p.id]) || 0;
            let esEliminado = ptsActuales > limite;
            let esGanadorRonda = (ultimoEstadoGalactico.winner === p.id);
            let manoComp = (ultimoEstadoGalactico.hands && ultimoEstadoGalactico.hands[p.id]) ? 
                           (Array.isArray(ultimoEstadoGalactico.hands[p.id]) ? ultimoEstadoGalactico.hands[p.id] : Object.values(ultimoEstadoGalactico.hands[p.id])) : [];
            
            let cardsHtml = manoComp.map(c => `
                <div class="carta-mini" style="${cardBG(c)}"></div>
            `).join("");

            return `<div class="score-row-result ${esEliminado ? 'eliminated' : ''} ${esGanadorRonda ? 'winner' : ''}" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <span>${p.name} ${p.id === myId ? '(Tú)' : ''}</span>
                            <b>${ptsActuales} ${esEliminado ? '💀' : ''}</b>
                        </div>
                        <div style="margin-top: 5px; display: flex; padding-left: 5px;">
                            ${cardsHtml}
                        </div>
                    </div>`;
        }).join("");

        // Solo un jugador (o ninguno si todos perdieron a la vez) con puntos <= limite queda?
        let jugadoresActivos = players.filter(p => (ultimoEstadoGalactico.points[p.id] || 0) <= limite);
        let alguienGanoTotal = jugadoresActivos.length <= 1;

        if (isHost) {
            if (alguienGanoTotal) {
                document.getElementById("btnSiguienteMano").style.display = "none";
                document.getElementById("btnVolverLobby").style.display = "block";
                document.getElementById("btnVolverLobby").onclick = terminarPartidaDefinitivamente;
                document.getElementById("resultTitle").innerText = "🏆 ¡TENEMOS UN CAMPEÓN! 🏆";
            } else {
                document.getElementById("btnSiguienteMano").style.display = "block";
                document.getElementById("btnVolverLobby").style.display = "none";
                document.getElementById("btnSiguienteMano").onclick = proximaManoChinchonHost;
                document.getElementById("resultTitle").innerText = "Ronda Finalizada";
            }
            document.getElementById("waitMsg").style.display = "none";
        } else {
            document.getElementById("btnSiguienteMano").style.display = "none";
            document.getElementById("btnVolverLobby").style.display = "none";
            document.getElementById("waitMsg").style.display = "block";
            if (alguienGanoTotal) document.getElementById("resultTitle").innerText = "🏆 ¡PARTIDA TERMINADA! 🏆";
        }
    } else {
        modal.style.display = "none";
    }
    
    if (!ultimoEstadoGalactico) return;

    // 3. Mazo y Descarte
    const deckPile = document.getElementById("deckPile");
    const deckCount = document.getElementById("deckCount");
    const discardPileDiv = document.getElementById("discardPile");

    if (deckPile) deckPile.style.cssText = dorso();
    if (deckCount) deckCount.innerText = (ultimoEstadoGalactico.deck || []).length;
    
    if(discardPileDiv) {
        if(ultimoEstadoGalactico.discardPile && ultimoEstadoGalactico.discardPile.length > 0) {
            discardPileDiv.style.cssText = cardBG(ultimoEstadoGalactico.discardPile[ultimoEstadoGalactico.discardPile.length - 1]);
        } else {
            discardPileDiv.style.cssText = "background: #2c1a10;";
        }
    }
    
    // 4. Mi mano
    const myHandDiv = document.getElementById("myHand");
    myHandDiv.innerHTML = "";
    let totalCards = myHand.length;
    let angleStep = 5;
    let startAngle = -((totalCards - 1) * angleStep) / 2;

    myHand.forEach((c, i) => {
        const div = document.createElement("div");
        div.className = `carta ${selectedCard === i ? "selected" : ""}`;
        div.style.cssText = cardBG(c);
        
        let angle = startAngle + i * angleStep;
        let transY = Math.abs(angle) * 0.8;
                 
        if (selectedCard === i) {
            div.style.transform = `rotate(${angle}deg) translateY(${transY - 30}px) scale(1.3)`;
            div.style.zIndex = 100;
        } else {
            div.style.transform = `rotate(${angle}deg) translateY(${transY}px)`;
            div.style.zIndex = i;
        }

        // Siempre se pueden tocar para ver las cartas o intercambiarlas
        div.onclick = () => { 
            if (selectedCard !== null && selectedCard !== i) {
                // INTERCAMBIO (SWAP)
                let temp = myHand[selectedCard];
                myHand[selectedCard] = myHand[i];
                myHand[i] = temp;
                selectedCard = null;
                // Guardamos el nuevo orden en Firebase
                let upds = {};
                upds[`gameState/hands/${myId}`] = myHand;
                gameRef.update(upds);
            } else {
                selectedCard = selectedCard === i ? null : i; 
            }
            actualizarJuego(); 
        };
        myHandDiv.appendChild(div);
    });
    
    // 5. Lógica del Turno (Texto)
    if(currentTurn === myId && gameActive && rondaEnCurso) {
        turnText.innerHTML = "🎯 TU TURNO";
        turnText.className = "turno mio";
    } else if(gameActive && rondaEnCurso) {
        let nom = otherPlayers.find(p=>p.id===currentTurn)?.name || "otro";
        turnText.innerHTML = `⏳ Turno de ${nom}`;
        turnText.className = "turno";
    }
    
    // 6. Lógica del Botón CERRAR (¡Corregida!)
    const puedeCerrarAhora = gameActive && rondaEnCurso && currentTurn === myId && hasDrawn && puedeCerrar(myHand);
    
    closeBtn.disabled = !puedeCerrarAhora;
    if (puedeCerrarAhora) {
        closeBtn.style.background = "#4caf50"; // Verde
        closeBtn.style.color = "white";
        closeBtn.style.animation = "pulse 1s infinite";
    } else {
        closeBtn.style.background = "#ccc"; // Gris
        closeBtn.style.color = "#666";
        closeBtn.style.animation = "none";
    }
}

function mezclar(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function proximaManoChinchonHost() {
    if (!isHost) return;
    
    // 1. Crear nueva baraja
    let baraja = [];
    const PALOS = ["oros", "copas", "espadas", "bastos"];
    for (let p of PALOS) {
        for (let n = 1; n <= 12; n++) baraja.push({ palo: p, numero: n, comodin: false });
    }
    let cantComodines = (ultimoEstadoGalactico.config && ultimoEstadoGalactico.config.comodines) || 0;
    for (let i = 0; i < cantComodines; i++) baraja.push({ palo: "comodin", numero: 0, comodin: true });

    let mazo = mezclar(baraja);
    let manos = {};
    let desc = [mazo.pop()];

    // 2. Solo repartir a los que no perdieron
    let limite = (ultimoEstadoGalactico.config && ultimoEstadoGalactico.config.maxPts) || 100;
    let jugadoresActivos = players.filter(p => (ultimoEstadoGalactico.points[p.id] || 0) <= limite);
    
    jugadoresActivos.forEach(p => {
        let mano = [];
        for (let i = 0; i < 7; i++) mano.push(mazo.pop());
        manos[p.id] = mano;
    });

    // 3. Turno al siguiente del que cerró (o el primero activo)
    let idxCerrador = players.findIndex(p => p.id === ultimoEstadoGalactico.winner);
    let nextTurnId = players[(idxCerrador + 1) % players.length].id;
    // Asegurar que el que sigue esté activo
    while (!jugadoresActivos.find(p => p.id === nextTurnId)) {
        idxCerrador++;
        nextTurnId = players[(idxCerrador + 1) % players.length].id;
    }

    gameRef.child("gameState").update({
        deck: mazo,
        discardPile: desc,
        hands: manos,
        currentTurn: nextTurnId,
        rondaEnCurso: true,
        winner: null,
        hasDrawn: false,
        lastLog: { msg: "✨ <b>Nueva ronda comenzada.</b>", time: Date.now() }
    });
}

function terminarPartidaDefinitivamente() {
    if (!isHost) return;
    let actualizaciones = { status: "finished" };
    players.forEach((p, index) => {
        actualizaciones[`players/${index}/points`] = (ultimoEstadoGalactico.points && ultimoEstadoGalactico.points[p.id]) || 0;
    });
    actualizaciones["gameState"] = null;
    gameRef.update(actualizaciones);
}

    
function robarMazo() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || deck.length === 0) return;
    playSfx('carta');
    let carta = deck.pop();
    myHand.push(carta);
    hasDrawn = true;
    selectedCard = null;
    
    let nombreYo = myName || (isHost ? "Anfitrión" : "Jugador");
    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano cada vez que robás
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/deck`] = deck;
    actualizaciones[`gameState/hasDrawn`] = true;
    actualizaciones[`gameState/lastLog`] = { msg: `<b>${nombreYo}</b> robó del mazo`, time: Date.now() };
    
    gameRef.update(actualizaciones);
}

function robarDescarte() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || hasDrawn || discardPile.length === 0) return;
    playSfx('carta');
    let carta = discardPile.pop();
    myHand.push(carta);
    hasDrawn = true;
    selectedCard = null;

    let nombreYo = myName || (isHost ? "Anfitrión" : "Jugador");
    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano cada vez que robás del descarte
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/hasDrawn`] = true;
    actualizaciones[`gameState/lastLog`] = { msg: `<b>${nombreYo}</b> robó del descarte`, time: Date.now() };
    
    gameRef.update(actualizaciones);
}
function obtenerSiguienteVivo(actualId) {
    let idx = players.findIndex(p => p.id === actualId);
    let total = players.length;
    
    // Traemos el límite real de la configuración
    let limite = (ultimoEstadoGalactico && ultimoEstadoGalactico.config) 
                 ? ultimoEstadoGalactico.config.maxPts 
                 : 100;

    for (let i = 1; i <= total; i++) {
        let siguiente = players[(idx + i) % total];
        
        // El turno solo pasa si el jugador tiene menos puntos que el límite (50, 100 o 200)
        if ((siguiente.points || 0) < limite) {
            return siguiente.id;
        }
    }
    return actualId; 
}

function descartar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn || selectedCard === null) return;
    playSfx('carta');
    
    let nombreYo = myName || (isHost ? "Anfitrión" : "Jugador"); 
    let carta = myHand.splice(selectedCard, 1)[0];
    discardPile.push(carta);
    
    let next = obtenerSiguienteVivo(myId);

    let actualizaciones = {};
    // ESTO ES LO QUE FALTABA: Subir tu mano actualizada (con una carta menos)
    actualizaciones[`gameState/hands/${myId}`] = myHand;
    actualizaciones[`gameState/discardPile`] = discardPile;
    actualizaciones[`gameState/currentTurn`] = next;
    actualizaciones[`gameState/hasDrawn`] = false;
    actualizaciones[`gameState/lastLog`] = { msg: `<b>${nombreYo}</b> descartó`, time: Date.now() };
    
    selectedCard = null;
    hasDrawn = false;
    
    gameRef.update(actualizaciones);
}


function abandonarPartida() {
    if (confirm("¿Estás seguro de que querés salir?")) {
        if (isHost && gameRef) {
            gameRef.remove(); 
        } else if (gameRef && myId) {
            // Eliminarme de la lista de jugadores y avisar
            let nuevosPlayers = players.filter(p => p.id !== myId);
            let logMsg = { msg: `🚨 <b>${myName || 'Un jugador'}</b> ha salido de la partida.`, time: Date.now() };
            gameRef.update({ 
                players: nuevosPlayers,
                "gameState/lastLog": logMsg 
            });
        }
        localStorage.removeItem("chinchon_roomId");
        localStorage.removeItem("esAnfitrion");
        window.location.href = "index.html";
    }
}


// 1. Primero definí esta función de apoyo (fuera de cerrar)
function calcularMejorPuntaje(mano) {
    let min = 999;
    for (let i = 0; i < mano.length; i++) {
        let t = [...mano]; 
        t.splice(i, 1);
        let p = puntosSueltas(t);
        if (p < min) min = p;
    }
    return min;
}

// 2. Ahora la función cerrar corregida
function cerrar() {
    if(!gameActive || !rondaEnCurso || currentTurn !== myId || !hasDrawn) return;
    
    if(puedeCerrar(myHand)) {
        let nombreYo = myName || (isHost ? "Anfitrión" : "Jugador");
        
        let nuevosPuntos = {};
        let miPuntajeRonda = calcularMejorPuntaje(myHand);
        
        // El Host o quien cierra calcula los puntos de todos basándose en Firebase
        players.forEach(p => {
            let ptsActuales = p.points || 0;
            let ptsRonda = 0;

            if (p.id === myId) {
                ptsRonda = miPuntajeRonda; 
            } else {
                // Buscamos la mano que el oponente tiene guardada en el servidor
                let suMano = [];
                if (ultimoEstadoGalactico && ultimoEstadoGalactico.hands && ultimoEstadoGalactico.hands[p.id]) {
                    suMano = Array.isArray(ultimoEstadoGalactico.hands[p.id]) 
                             ? ultimoEstadoGalactico.hands[p.id] 
                             : Object.values(ultimoEstadoGalactico.hands[p.id]);
                }
                ptsRonda = puntosSueltas(suMano); 
            }
            
            nuevosPuntos[p.id] = ptsActuales + ptsRonda;
        });

        let logMsg = `✨ <b>${nombreYo}</b> cerró la ronda ✨`;
        if (esChinchon(myHand)) {
            logMsg = `🔥 <b>¡CHINCHÓN!</b> ${nombreYo} resta 10 puntos 🔥`;
            nuevosPuntos[myId] -= 10;
        }

        let actualizaciones = {};
        actualizaciones[`gameState/hands/${myId}`] = myHand;
        actualizaciones[`gameState/rondaEnCurso`] = false;
        actualizaciones[`gameState/winner`] = myId;
        actualizaciones[`gameState/points`] = nuevosPuntos;
        actualizaciones[`gameState/lastLog`] = { msg: logMsg, time: Date.now() };

        players.forEach((p, index) => {
            actualizaciones[`players/${index}/points`] = nuevosPuntos[p.id];
        }); 
        gameRef.update(actualizaciones);
    } else {
        addLog("❌ No puedes cerrar");
    }
}




// --- ASIGNACIÓN DE EVENTOS SEGURA (USÁ SOLO ESTA) ---
const btnAbandonar = document.getElementById("abandonBtn");
if (btnAbandonar) btnAbandonar.onclick = abandonarPartida;

const btnSalir = document.getElementById("quitGameBtn");
if (btnSalir) btnSalir.onclick = abandonarPartida;

const btnCerrar = document.getElementById("closeBtn");
if (btnCerrar) btnCerrar.onclick = cerrar;




    
function iniciarJuego(estado) {
    // 1. Carga inicial de variables
    myHand = (estado.hands && estado.hands[myId]) ? estado.hands[myId] : [];
    deck = estado.deck || [];
    discardPile = estado.discardPile || [];
    currentTurn = estado.currentTurn;
    myPoints = (estado.points && estado.points[myId]) ? estado.points[myId] : 0;
    
    rondaEnCurso = estado.rondaEnCurso;
    hasDrawn = estado.hasDrawn || false;
    gameActive = true;
    selectedCard = null;
    
    otherPlayers = players.filter(p => p.id !== myId).map(p => ({
        id: p.id, name: p.name, points: (estado.points && estado.points[p.id]) || 0
    }));
    
    gameScreen.classList.remove("hidden");
    ultimoEstadoGalactico = estado; 
    actualizarJuego();
    
    // 2. Listener en tiempo real
    gameRef.child("gameState").on("value", (snap) => {
        let nuevo = snap.val();
        if(nuevo) {
            ultimoEstadoGalactico = nuevo; 

            if (nuevo.currentTurn === myId && currentTurn !== myId) {
                playSfx('turno');
            }

            let anteriorRonda = rondaEnCurso; 
            deck = nuevo.deck || [];
            discardPile = nuevo.discardPile || [];
            rondaEnCurso = nuevo.rondaEnCurso;
            currentTurn = nuevo.currentTurn;
            hasDrawn = nuevo.hasDrawn || false;

            if(nuevo.hands && nuevo.hands[myId]) {
                myHand = Array.isArray(nuevo.hands[myId]) ? nuevo.hands[myId] : Object.values(nuevo.hands[myId]);
            }

            if(nuevo.points) {
                myPoints = nuevo.points[myId] || 0;
                otherPlayers.forEach(op => {
                    if(nuevo.points[op.id] !== undefined) op.points = nuevo.points[op.id];
                });
            }

            if (nuevo.lastLog && nuevo.lastLog.time !== lastProcessedLog) {
                lastProcessedLog = nuevo.lastLog.time;
                addLog(nuevo.lastLog.msg);
            }

            // 3. DETECTAR CIERRE DE RONDA Y SONIDOS
            if(nuevo.winner && anteriorRonda === true && rondaEnCurso === false) {
                if(nuevo.winner === myId) playSfx('ganar');
                else playSfx('perder');
            }

            actualizarJuego();
        }
    });
}

    document.getElementById("mazoBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarMazo();
            else if(hasDrawn && selectedCard !== null) cerrar();
        }
    };
    document.getElementById("descarteBtn").onclick = () => {
        if(currentTurn === myId && gameActive && rondaEnCurso) {
            if(!hasDrawn) robarDescarte();
            else if(hasDrawn && selectedCard !== null) descartar();
        }
    };
    closeBtn.onclick = cerrar;
    
    // Cargar imagen
    const img = new Image();
    img.onload = () => { SPRITE_URL = IMAGE_FILE; };
    img.src = IMAGE_FILE;
window.addEventListener('load', () => {

    if (roomId) {
        
        // Conectamos a la sala automáticamente
        gameRef = db.ref("games/" + roomId);
        gameRef.once("value", (snap) => {
            if(snap.exists()) {
                // Si la partida ya empezó, el listener de abajo nos meterá al juego
    gameRef.on("value", (snap) => {
        let data = snap.val();
        if(data) {
            players = data.players || [];
            if(data.status === "playing" && data.gameState) iniciarJuego(data.gameState);
            else window.location.href = "index.html";
        } else {
            // El host borró la sala (data === null)
            alert("El anfitrión ha cerrado la sala.");
            window.location.href = "index.html";
        }
    });
            }
        });
    }
});




</script>
